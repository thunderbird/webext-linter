# LLM_API_TYPE=ollama (a local, OpenAI-compatible server), driven by the same
# adapter as chatgpt. Consumed by src/llm/settings.js; see chatgpt.yaml for the
# full format.
#
# Such a server speaks only /v1/chat/completions + max_tokens, and its models are
# whatever the user pulled - so the one catch-all entry is the request we have
# always sent, and it is the only entry there is.

default:
  model: llama3.1 # tool-capable; must first be pulled (`ollama pull llama3.1`)
  maxRequests: 25

models:
  - match: .*
    endpoint: chat
    parameters:
      max_tokens: 8192
