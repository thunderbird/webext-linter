# LLM_API_TYPE=chatgpt (the OpenAI API). Consumed by src/llm/settings.js.
#
# `default` is what is type-wide: which model a run uses when LLM_API_MODEL is
# unset, and how many model requests one run may make before pausing. Everything
# about HOW to talk to a model - the endpoint and the request parameters - lives
# in that model's entry below. `parameters` is spread verbatim into the request
# body, so a new knob (temperature, reasoning, ...) is a YAML edit, no code.
#
# An entry is keyed by EITHER `name` (one exact model id) OR `match` (a regex
# over the id), never both. A model resolves against the `name` entries, then the
# `match` entries in file order - so the trailing catch-all is the last resort for
# a model we know nothing about.
#
# The endpoint dictates which token parameter is legal:
#   chat      -> max_tokens | max_completion_tokens
#   responses -> max_output_tokens
#
# This table is a starting guess, and editing it here is how you change it: OpenAI
# publishes no way to ASK which endpoint or parameter a model wants. When a server
# rejects a request shape the adapter negotiates a working one and caches THAT (the
# endpoint and the parameter's name, nothing else) under .llm-model-cache, never
# here - so your edits keep winning on everything it did not learn, and
# `--cache-clear` makes it forget what it did.

default:
  model: gpt-4.1 # for its 1M-token context: add-ons can be large (gpt-4o's 128k overflowed)
  maxRequests: 25 # total model requests one run may make before pausing

models:
  - name: gpt-4.1
    endpoint: chat
    parameters:
      max_tokens: 8192 # cap on the tokens the model may GENERATE (output, not input)

  # Codex is Responses-only: chat/completions 404s and names the endpoint. The
  # cap covers hidden reasoning AND the answer, so 8192 would starve the reply.
  - match: codex
    endpoint: responses
    maxRequests: 15
    parameters:
      max_output_tokens: 32768

  # Reasoning models on chat/completions reject max_tokens outright.
  - match: ^(gpt-5|o[1-9])
    endpoint: chat
    parameters:
      max_completion_tokens: 32768

  # Anything else: the request every OpenAI-compatible server understands.
  - match: .*
    endpoint: chat
    parameters:
      max_tokens: 8192
