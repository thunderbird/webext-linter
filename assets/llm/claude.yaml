# LLM_API_TYPE=claude (the Anthropic API). Consumed by src/llm/settings.js; see
# chatgpt.yaml for the full format.
#
# No `endpoint`: Anthropic serves every model from one endpoint under one token
# parameter, so there is nothing here to negotiate. max_tokens is required by that
# API, which 400s when it exceeds a model's output ceiling;
# 8192 is within every current Claude model's ceiling and large enough that our
# verdict JSON and our summaries never truncate.

default:
  model: claude-sonnet-4-6
  maxRequests: 25

models:
  - match: .*
    parameters:
      max_tokens: 8192
