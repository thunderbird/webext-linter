# Curated blocklist of third-party JavaScript library versions that Mozilla's
# add-on policy disallows (banned) or discourages (unadvised), mirroring the
# addons-linter behaviour. Unlike the identification hash DB (Mozilla dispensary's
# hashes.txt, fetched at runtime), Mozilla publishes no machine-readable block DB:
# the policy lives in the addons-linter source. So this file is hand-curated and
# must be kept in sync manually. Monitor:
#   https://github.com/mozilla/addons-linter/blob/master/docs/third-party-libraries.md
#
# Note: some Mozilla restrictions are a MOVING TARGET - "the latest 1.x / 2.x at
# submission time" (AngularJS, DOMPurify) - which a fixed threshold cannot track. So
# this file encodes only fixed SECURITY floors (a version below which a known advisory
# applies): jQuery < 3.0, and the AngularJS < 1.5.9 CSP-bypass fix. DOMPurify's "latest
# 2.x" policy has no such fixed floor, so it is intentionally not listed here.
#
# Each entry is keyed by the library's npm package name (the same namespace the OSV
# audit uses; a dispensary alias like "angularjs" is normalised to "angular" before
# lookup). A version strictly below `banned_below` is banned (error); one below
# `unadvised_below` is unadvised (warning). Consumed by src/checks/lib/library-blocks.js.

- name: jquery
  banned_below: "3.0.0"
  reason: "jQuery before 3.0 is unsupported and carries known security issues; update to the latest 3.x."

- name: angular # AngularJS 1.x is published on npm as "angular"
  banned_below: "1.5.9"
  reason: "AngularJS before 1.5.9 is affected by a Content-Security-Policy bypass; update to the latest 1.x."
