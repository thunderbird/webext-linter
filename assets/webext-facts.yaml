# Hand-curated Thunderbird / WebExtension domain facts the API schema does not
# express. These must track Thunderbird by hand, so they live here as DATA (in
# assets/, like registry.yaml and library-blocks.yaml) rather than hardcoded in
# src/. The loader is src/parse/webext-facts.js; each list's consumer is named
# below.

# The API root globals - the WebExtension namespace objects a call chain is
# rooted at (all three valid in Thunderbird). Consumer: src/parse/api-base.js.
api-roots:
  - browser
  - messenger
  - chrome

# WebExtension namespaces holding user data: a call to one inside a network
# sink's argument is direct evidence the payload carries user data. Consumer:
# src/parse/network-sinks.js (carriesData).
data-apis:
  - messages
  - messageDisplay
  - compose
  - contacts
  - addressBooks
  - accounts
  - identities
  - folders
  - mailTabs

# Privileged globals a WebExtension sandbox never provides - a reference to one
# in pure-WebExtension code is a core-symbol leak. The short Components shortcuts
# (Cc/Ci/Cu/Cr/Cm) and the Extension* Experiment base globals are included; all
# are matched only as GLOBAL references (a shadowing local binding or import of
# the same name is exempt). Consumer: src/parse/core-symbols.js.
core-symbols:
  - Services
  - Components
  - Cc
  - Ci
  - Cu
  - Cr
  - Cm
  - ChromeUtils
  - XPCOMUtils
  - ctypes
  - IOUtils
  - PathUtils
  - ChromeWorker
  - ExtensionCommon
  - ExtensionAPI
  - ExtensionParent

# Root-relative file loaders: their path resolves against the extension ROOT
# (".." clamped at root), like a manifest path. Empirically confirmed for
# runtime.getURL; documented for scripting.* (MDN: "files" are relative to the
# extension's root directory). EVERY OTHER file loader resolves against the
# CALLING DOCUMENT (base:"page"). Consumer: src/parse/loader-files.js.
root-relative-file-methods:
  - runtime.getURL
  - scripting.executeScript
  - scripting.insertCSS
  - scripting.removeCSS

# TEMPORARY bridge (consumer: src/parse/loader-files.js): file-loading API
# methods the schema cannot yet mark (their path is a plain string / generic
# "url", not a relativeUrl format). Delete an entry once the schema tags that
# method's path parameter - it is then derived (fileLoaderMethods) and handled by
# the schema-directed branch, leaving the entry dead (see TODO.md). Key = the
# dotted method (after the API root); the value says where the path sits: `arg0`
# (the positional first argument) and/or option keys holding a string
# (`stringKeys`) or a string array (`arrayKeys`), looked up in any object
# argument. `mv` restricts an entry to one manifest_version, for methods that
# exist only there (MV3 renamed browserAction -> action and replaced
# tabs.executeScript/insertCSS/removeCSS with scripting.*).
bridge:
  # runtime.getURL("path") - a root-relative resource URL (both versions).
  runtime.getURL: { arg0: true }
  # tabs.executeScript|insertCSS|removeCSS {file}/{files}: MV2 only (MV3 uses the
  # scripting.* equivalents below).
  tabs.executeScript: { stringKeys: [file], arrayKeys: [files], mv: 2 }
  tabs.insertCSS: { stringKeys: [file], arrayKeys: [files], mv: 2 }
  tabs.removeCSS: { stringKeys: [file], arrayKeys: [files], mv: 2 }
  scripting.executeScript: { stringKeys: [file], arrayKeys: [files] }
  scripting.insertCSS: { stringKeys: [file], arrayKeys: [files] }
  scripting.removeCSS: { stringKeys: [file], arrayKeys: [files] }
  # tabs.create({url}) - a packaged page (or a remote url; callers drop remote).
  tabs.create: { stringKeys: [url] }
  # <action>.setPopup({popup}): the default action is browserAction in MV2,
  # renamed to action in MV3 (compose/messageDisplay action exist in both).
  browserAction.setPopup: { stringKeys: [popup], mv: 2 }
  action.setPopup: { stringKeys: [popup], mv: 3 }
  composeAction.setPopup: { stringKeys: [popup] }
  messageDisplayAction.setPopup: { stringKeys: [popup] }
