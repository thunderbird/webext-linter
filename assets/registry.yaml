# Note: Responses should not contain line breaks, as they can be copied into the
#       response window on ATN, which will reflow them. Line breaks will create
#       ugly-looking response messages sent to the developer.
#
# The check-bearing sections below ARE the phases: a check's phase IS the section it
# lives in, so no entry declares one. The orchestrator (runChecks) knows this closed set
# and looks up the phases it wants, in the order it runs them - invalid-experiment (which
# short-circuits the whole review), then deterministic, then llm, then post-summary (run
# by the pipeline after the AI add-on summary). A section it never asks for is inert, so
# every other top-level section here (permission-prompts, manual-checks, messages, ...) is
# simply not a phase.

# The reject phase: when the add-on is an invalid Experiment, this is the ONLY phase that
# runs - no other check, no LLM, no summaries, no manual list.
invalid-experiment-phase:
# Aborts the review of an Experiment that uses an UNSUPPORTED experiment (an
# unknown API draft, or one shadowing a built-in). A recognised but modified draft
# does NOT land here; it is reviewed normally and flagged by experiment-modified.
# The per-experiment reason is appended to each location line.
- title: Experiment APIs not accepted
  severity: error
  check: experiment-not-allowed
  input: source
  response: |-
    We are currently not accepting new submissions using Experiment APIs, except unmodified copies of the latest published API drafts (https://github.com/thunderbird/webext-experiments). The following cannot be accepted:
    Read more: https://thunderbird.topicbox.com/groups/addons/T6ff545fb6d479da5/temporary-pause-on-new-experiment-api-add-on-reviews

deterministic-phase:
# Flags a privileged core global (Services, ChromeUtils, Components/Cc/Ci/Cu, ...)
# referenced in pure WebExtension code, where the sandbox does not provide it. The
# Experiment dependency tree (and its mixed/unsure files) is exempt.
- title: Privileged core symbol in WebExtension code
  severity: error
  check: core-symbol-in-webext
  input: source
  response: |-
    This add-on is using privileged Thunderbird internals in a WebExtension context, where they are not available: background, content, options and popup scripts run in a sandbox without chrome privileges. Remove the usage.

# Flags use of a Mozilla/Thunderbird trademark in the add-on name (the icon is a
# separate manual check).
- title: Trademark violation
  severity: error
  check: trademark-violation
  input: xpi
  response: |-
    This extension uses a registered trademark of Mozilla in its name or icon and is unallowable under Mozilla’s Trademark Policy (https://www.mozilla.org/foundation/trademarks/policy/). For Mozilla trademarks, the usage of “Mozilla” and “Thunderbird” are generally not allowed in the add-on name, except in the following format: “ADD-ON NAME for Thunderbird.”

# Flags API namespaces or members absent from the schema, or marked unsupported.
- title: Unknown or unsupported WebExtension API
  severity: error
  check: unknown-api
  input: source
  response: |-
    The following WebExtension APIs are not supported in the targeted Thunderbird version.
    Read more: https://webextension-api.thunderbird.net/.

# Flags deprecated APIs.
- title: Deprecated WebExtension API
  severity: info
  check: deprecated-api
  input: source
  response: |-
    "{{item}}" is deprecated in the targeted Thunderbird version. Please migrate to a supported API.
    Read more: https://webextension-api.thunderbird.net/.

# Flags functions/events added after the declared strict_max_version: the add-on
# caps support below the Thunderbird where the API first appeared.
- title: API newer than strict_max_version
  severity: error
  check: strict-max-version-api
  input: source
  response: |-
    The add-on is setting strict_max_version to {{max}} but uses functions or events added in a later Thunderbird. Raise strict_max_version, or stop using these APIs.

# Flags an API call whose required permission is not declared.
- title: Missing permission
  severity: error
  check: missing-permission
  input: source
  response: |-
    "{{item}}" permission is required here, but is not declared in the manifest. Add it to the requested permissions.

# Flags an API call that needs a manifest key (e.g. "action") not declared.
- title: Missing manifest key
  severity: error
  check: missing-manifest-key
  input: source
  response: |-
    {{item}} needs a manifest key that is not declared: {{keys}}. Add one of those keys to manifest.json.

# manifest.json is present but not valid JSON.
- title: Invalid manifest JSON
  severity: error
  check: manifest-invalid-json
  input: manifest
  response: |-
    Invalid manifest.json: manifest.json is not valid JSON.
    Read more: https://webextension-api.thunderbird.net/.

# No manifest.json at the add-on root.
- title: Missing manifest
  severity: error
  check: manifest-missing
  input: manifest
  response: |-
    Invalid manifest.json: no manifest.json at the add-on root.
    Read more: https://webextension-api.thunderbird.net/.

# A required top-level manifest key is absent.
- title: Missing required manifest key
  severity: error
  check: manifest-missing-key
  input: manifest
  response: |-
    Invalid manifest.json: one or more required properties are missing.
    Read more: https://webextension-api.thunderbird.net/.

# manifest_version disagrees with the schema set being reviewed.
- title: Manifest version mismatch
  severity: error
  check: manifest-version-mismatch
  input: manifest
  response: |-
    Invalid manifest.json: manifest_version {{item}} does not match the schema set (Manifest V{{schema}}).
    Read more: https://webextension-api.thunderbird.net/.

# A declared permission value that is neither a known permission, a
# data-collection permission, nor a match pattern.
- title: Unknown permission
  severity: error
  check: manifest-unknown-permission
  input: manifest
  response: |-
    Invalid manifest.json: one or more requested permissions are unknown.
    Read more: https://webextension-api.thunderbird.net/.

# An unknown top-level manifest key (Thunderbird ignores it).
- title: Unrecognized manifest key
  severity: info
  check: unrecognized-manifest-key
  input: xpi
  response: |-
    Invalid manifest.json: the following top-level keys are unknown and will be ignored by Thunderbird.
    Read more: https://webextension-api.thunderbird.net/.

# A known manifest key with a wrong-typed value (Thunderbird misreads it).
- title: Mistyped manifest value
  severity: warning
  check: mistyped-manifest-value
  input: manifest
  response: |-
    Manifest entry issue: "{{item}}" {{detail}}. Thunderbird ignores or misreads such entries.
    Read more: https://webextension-api.thunderbird.net/.

# Flags manifest/loader references (scripts, popups, icons, ...) to files not in
# the package.
- title: Missing referenced file
  severity: error
  check: bundled-files
  input: xpi
  response: |-
    The following referenced file(s) are not bundled with the add-on, or the path may be wrongly specified. Please include every referenced file in the package, and check that the used paths are correct.

# Flags a packaged file the add-on loads (manifest reference or <script src>) whose file type
# is not recognized, so no check could review it - the backstop for the JS-corpus suffix set.
- title: Unrecognized referenced file type
  severity: error
  check: unrecognized-file-type
  input: xpi
  response: |-
    The following packaged file(s) are referenced by the add-on ({{referrer}}) but have a file type the review tools do not recognize, so they could not be classified or reviewed. The browser still loads them. Please give each a standard extension for its content (for example a .js script), or confirm what the file is and why it is shipped. If this is a build artifact your packaging step emitted, review what your build produces.

# Flags synchronous XMLHttpRequest (open(..., false)), which blocks the UI thread.
- title: Synchronous XMLHttpRequests
  severity: error
  check: sync-xhr
  input: source
  response: |-
    The add-on makes a synchronous XMLHttpRequest, which can lock up the user interface. Please use an asynchronous request instead.

# Flags every write to innerHTML/outerHTML/srcdoc/insertAdjacentHTML (only
# Element.setHTML() is sanctioned); an empty-string/null clear is exempt.
- title: Modifying innerHTML; use Element.setHTML()
  severity: info
  check: unsafe-html
  input: source
  response: |-
    Inserting markup via "{{item}}" will be no longer permitted after the release of ESR 153. The only supported way to do so is the Sanitizer API (Element.setHTML(), Thunderbird 148+). Please also consider alternatives to (re-)building the live DOM (use textContent, a <template>, or CSS to show and hide existing elements).
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/innerHTML.html.

# Flags unconditional debugger statements left in shipped code.
- title: Debugger statement
  severity: error
  check: debugger-statement
  input: source
  response: |-
    Unconditional debugger statement. Please remove it or move it behind a config flag.

# Flags an async listener passed to runtime.onMessage.addListener().
- title: Async listener in runtime.onMessage()
  severity: warning
  check: async-onmessage
  input: source
  response: |-
    Asynchronous listener attached to runtime.onMessage. This is error-prone and must be avoided.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/runtimeMessaging.html

# ESLint correctness rules (no-redeclare/no-shadow/no-empty/no-unreachable/...)
# over the add-on’s authored JS. Style/fixable rules are excluded (read-only tool).
- title: JavaScript code errors
  severity: info
  check: code-sanity
  input: source
  eslint: true
  response: |-
    Static analysis flagged a likely code error: {{item}}

# Flags broad host permissions (<all_urls> or a "*" host) requested as required.
- title: Minimize host permissions
  severity: info
  check: minimize-host-permissions
  input: manifest
  response: |-
    The manifest requests one or more very broad host permissions that are granted at install. Request only the specific hosts your add-on actually needs. If it genuinely needs broad access, declare them as optional host permissions so the user can grant them on demand rather than up front.
    Read more: https://thunderbird.topicbox.com/groups/addons/Tafa58394231a18f8-M3e565a75287313ea4395ff5f/prefer-to-use-optionalhostpermissions-to-get-around-cors-issues-with-fetch

# Producer of the declared permissions worth a closer look: every declared NAMED
# permission a reachable API call does not provably require (host patterns are
# Minimize host permissions' concern). Runs in the main loop. A permission whose
# prompt entries (see permission-prompts) declare usage `tokens` that appear
# NOWHERE in the add-on's live code (comments excluded) or manifest is
# deterministically unused - a warning finding, with or without --llm-review
# (the deterministic path stands down when the scan is blind: an SCA review or
# unresolved dynamic API surface). Every other case is scheduled as a
# manual-review escalation; same-bodied cases auto-group into the one reminder
# here. When --llm-review runs, the escalations are handed to the Unused
# permission recheck consumer (post-summary-recheck) instead, to be re-judged
# against the whole add-on.
- title: Possibly unused permissions
  severity: warning
  check: unused-permission
  input: source
  post-summary-recheck: unused-permission-recheck
  response: |-
    One or more declared permissions appear to be unused. An add-on should request only the permissions it needs, to keep the install-time permission prompt minimal. Please remove any permission your add-on does not use, or let us know which part of the add-on stops working without it.
  instructions: |-
    Review whether the following declared permissions are used, and ask the
    developer to remove any that are not needed.

# Flags a bundled file whose content hash matches a known third-party library
# release (named after each path) that is not declared in a VENDOR file.
- title: Missing third-party library reference
  severity: info
  sca: false
  check: missing-library
  input: source
  response: |-
    The following bundled files were recognized as third-party libraries (via Mozilla library hash database), but are not declared as such. Please declare each and link its source so the (unmodified) bundled copy can be verified against the linked version - a VENDOR.md file at the add-on root is common practice.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.

# Flags a bundled file the Mozilla hash DB did not recognize but whose exact bytes
# were found on the jsDelivr CDN - a known third-party library, shipped undeclared.
- title: Library identified on a CDN
  severity: info
  sca: false
  check: find-lib-on-cdn
  input: source
  response: |-
    The following bundled files were recognized as third-party libraries (via jsDelivr CDN hash lookup), but are not declared as such. Please declare each and link its source so the (unmodified) bundled copy can be verified against the linked version - a VENDOR.md file at the add-on root is common practice.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.

# Flags minified JS that is not a recognized library; asks for the readable
# original. Runs in both XPI and source-code submission reviews (no sca gate) - a
# source submission's promise is readable source, so a minified file there is
# rejected just like one in a built XPI.
- title: Minified code cannot be reviewed
  severity: error
  check: minified-code
  input: source
  response: |-
    The following file(s) are minified or otherwise machine-generated code, which cannot be reviewed in this form. Each is either an undeclared third-party library that we did not recognize, or minified first-party code. If a file is a third-party library, declare it as such and link its source so the (unmodified) bundled copy can be verified against the linked version (a VENDOR.md file at the add-on root is common practice). If it is your own code, provide the original, human-readable source for it - the add-on does not need to be minified. Where the readable code is produced by a build step, supply the build's sources and the instructions needed to reproduce the shipped XPI, using the source code upload field available during submission or on the version page in the developer hub. Note that the source-archive route slows review down, as it requires manually verifying the build process and that it reproduces the shipped XPI.
    Read more #1: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.
    Read more #2: https://extensionworkshop.com/documentation/publish/source-code-submission/

# Flags a bundled file whose bytes match a pinned upstream release, but which is
# not a confirmed widely-used library AND is minified/obfuscated - untrusted and
# unreviewable, so a readable build is required.
- title: Source Archive (unverified library) required
  severity: error
  sca: false
  check: untrusted-minified-library
  input: source
  response: |-
    The following bundled file(s) match a known upstream release, but the package could not be confirmed to be a widely-used library, so it is not trusted as a reviewed dependency - and it is minified or otherwise machine-generated, so it cannot be reviewed in this form. Ship the original, human-readable code directly (it need not be minified), or upload the original sources as a source-code submission (with the build instructions and process needed to reproduce the shipped XPI) using the source code upload field during submission or on the version page in the developer hub. Note that the source-archive route slows review down, as it requires manually verifying the build.
    Read more #1: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.
    Read more #2: https://extensionworkshop.com/documentation/publish/source-code-submission/

# Notes a bundled file whose bytes match a pinned upstream release but which is
# not a confirmed widely-used library, and IS readable - so it is reviewed as the
# developer's own code rather than trusted as a vendored dependency.
- title: Library reviewed as authored code
  severity: info
  sca: false
  check: untrusted-library
  input: source
  response: |-
    The following bundled file(s) match a known upstream release, but the package could not be confirmed to be a widely-used library. They are therefore not trusted as reviewed dependencies and are reviewed as authored code - the standard checks apply to them, so a finding may be reported against library code here. Confirm that each is a legitimate, appropriate dependency.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.

# SCA mode (source code archive, sca: true): a declared dependency that is not
# a confirmed widely-used library cannot be reviewed - its code is pulled in at
# build, absent from the readable source and mangled in the built XPI - so the
# developer must ship it readable inside --sca-source. verifyScaDependencies
# records the non-popular package.json dependencies (vendor.unpopularDeps).
- title: Unreviewable build dependency
  severity: error
  sca: true
  check: unpopular-source-dependency
  input: source
  response: |-
    The following dependencies could not be confirmed to be widely-used. They need to be packaged non-minified with the add-on in order to be reviewed.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.

# Diff check (--diff-to): a version + gecko strict_max_version-only bump that the
# developer could make on ATN instead of resubmitting.
- title: 'strict_max_version can be updated on ATN'
  severity: info
  check: strict-max-version-bump-only
  input: xpi
  diff: true
  response: |-
    Instead of submitting a new version that only increases the strict_max_version entry in your manifest, you can update the max version setting of the most recent submission directly on this add-on’s ATN admin page.

# Reports dynamic/aliased API access the static analysis cannot resolve.
- title: Static analysis coverage
  severity: info
  check: api-coverage
  input: source
  response: |-
    Limited static-analysis coverage: {{item}}

# Reports a file that failed to parse, so its API checks were skipped.
- title: Unparsable file
  severity: info
  check: unparsable-file
  input: source
  response: |-
    Limited static-analysis coverage: could not be parsed, so API checks were skipped ({{detail}})

# Flags a recognised published Experiment draft that is bundled modified or
# outdated (it would be accepted if it were the unmodified latest upstream copy).
- title: Modified or outdated Experiment draft
  severity: error
  check: experiment-modified
  input: source
  response: |-
    "{{item}}" is a published Thunderbird Experiment API draft, but this add-on bundles a modified or outdated copy. Bundle the unmodified latest version from https://github.com/thunderbird/webext-experiments.

# Flags an accepted Experiment (--allow-experiments) that declares no
# strict_max_version.
- title: Experiment missing strict_max_version
  severity: error
  check: experiment-missing-strict-max-version
  input: manifest
  response: |-
    This add-on uses Experiment APIs but declares no strict_max_version. Experiments rely on internal APIs that change between major Thunderbird versions, so they must set browser_specific_settings.gecko.strict_max_version.

# Flags an Experiment whose declared API overrides or grafts onto a built-in
# Thunderbird API instead of adding a new one.
- title: Experiment overrides a built-in API
  severity: error
  check: experiment-overrides-api
  input: manifest
  response: |-
    The Experiment API "{{item}}" overrides or extends a built-in Thunderbird API. Experiments may only add new APIs, never replace or graft onto existing ones. Please expose this functionality under a new, distinct API namespace.

# A deterministic check that escalates a whole-add-on manual review for every
# Experiment submission: Experiments have full access to Thunderbird internals, so
# they need a careful human review. Emits no findings, so it carries no severity.
- title: Experiment code review
  check: experiment-manual-review
  input: manifest
  instructions: |-
    This is an Experiment submission, which requires careful code review since it
    has full access to Thunderbird's internals. The Experiment surface should be
    kept to a minimum and must not affect Thunderbird's usability, stability,
    performance, or security. To reduce review time, it may help to review only
    the differences from the last approved submission.
  response: |-
    This is an Experiment submission, which requires careful code design and
    planning, since it has full access to Thunderbird's internals. The Experiment
    surface should be kept to a minimum and must not affect Thunderbird's
    usability, stability, performance, or security.

# Escalates a manual review when an Experiment calls a WebExtension API the schema
# does not recognize - usually a typo in the add-on's OWN experiment schema, which
# reads like a false-positive unsupported-API finding. Emits no findings (no
# severity); unknown-api already lists the specific APIs.
- title: Experiment with unrecognized API usage
  check: experiment-unknown-api
  input: source
  instructions: |-
    This Experiment calls WebExtension APIs the schema does not recognize (see the
    "Unknown or unsupported WebExtension API" findings). For an experiment's OWN API,
    this is usually a typo in that experiment's schema, NOT a genuine unsupported-API
    rejection: the schema's `namespace` is the sole authority for the API name, so if
    it does not match the API the code calls (regardless of the manifest's
    experiment_apis key or parent.paths), the API is effectively undefined. Verify the
    experiment schemas before treating these as unsupported APIs.
  response: |-
    This Experiment calls WebExtension APIs that are not defined by any schema. If
    these are your own Experiment APIs, verify that each experiment's schema declares
    the matching `namespace` - the schema namespace is authoritative, so a typo there
    leaves the API undefined even when the manifest declares it.

# Flags a non-Experiment that pins strict_max_version (only blocks newer
# Thunderbird; the APIs are forward-compatible).
- title: Unnecessary strict_max_version
  severity: warning
  check: non-experiment-strict-max-version
  input: manifest
  response: |-
    This add-on pins strict_max_version "{{item}}". The WebExtension APIs are stable and designed to keep add-ons forward-compatible across Thunderbird versions, so a maximum version is usually unnecessary and only blocks installs on newer Thunderbird.

# Third-party (vendored) declarations - a package.json with dependencies, or a
# VENDOR file listing files and their source URLs - are resolved and verified
# once before the review (src/vendor/*: parse, pin, fetch, byte-compare,
# popularity). The vendor checks below read that precomputed result: three
# reject a submission (an unpinnable dependency, a non-pinned source, or a
# modified file), one escalates the unverifiable cases to manual review, and one
# warns when a declared file is missing.
- title: Unpinned dependency
  severity: error
  check: unpinned-dependency
  input: source
  response: |-
    The following dependencies are not pinned to an exact version. A version range can resolve to different releases over time, so the bundled copy cannot be verified against a known upstream. Pin each to an exact version in package.json, or commit the lock file (package-lock.json, npm-shrinkwrap.json, yarn.lock, or pnpm-lock.yaml) that records the exact version used.

# A package.json dependency from a source the review cannot identify or verify -
# only npm (pinned) and GitHub URLs are supported. Rejects everything else.
- title: Unsupported dependency source
  severity: error
  check: unsupported-dependency
  input: source
  response: |-
    The following dependencies are declared from a source the review cannot identify or verify. Only npm packages (pinned to an exact version or recorded in a committed lock file) and GitHub URLs are supported. Re-declare each as a pinned npm package or a GitHub source, or bundle the library with the add-on as non-minified authored code so it can be reviewed directly.

# Each pinned npm name@version - a package.json dependency or an npm-sourced
# VENDOR entry - is audited against the OSV database (src/vendor/verify.js); a
# package with known advisories is reported here.
# severity:auto - the check sets each finding's severity from the advisory's OSV
# band (high/critical -> error, moderate/medium -> warning, else info).
- title: Vulnerable dependency
  severity: auto
  check: vendor-vulnerable
  input: source
  response: |-
    A bundled dependency has known security vulnerabilities: {{item}} ({{version}}) is affected by published advisories ({{ids}}; severity {{severity}}). Update {{item}} to {{fixed}} or later, re-bundle, and resubmit.

# A bundled library version Mozilla's add-on policy disallows (banned) or discourages
# (unadvised), matched against the curated assets/library-blocks.yaml BEFORE the OSV
# audit (src/vendor/verify.js) - a banned version also skips the OSV request. Distinct
# from vendor-vulnerable (published CVE advisories); this is Mozilla policy, which can
# ban a version with no formal advisory.
# severity:auto - banned -> error, unadvised -> warning (set by the banned-library check).
- title: Banned library
  severity: auto
  check: banned-library
  input: source
  response: |-
    A bundled library version is {{status}} by Mozilla's add-on policy: {{item}} ({{version}}) — {{reason}} Update to a permitted version and re-bundle.

# Each pinned npm devDependency is OSV-audited in SCA mode too (src/vendor/verify.js
# verifyScaDependencies): the reviewer builds the add-on from source, so a
# vulnerable build-time dependency runs on the reviewer's machine even though it is
# never shipped. Mirrors vendor-vulnerable (same severity:auto band mapping) for the
# dev set; sca:true - dev deps only exist in an SCA review.
- title: Vulnerable build dependency
  severity: auto
  sca: true
  check: vendor-vulnerable-dev
  input: source
  response: |-
    A build dependency (devDependency) has known security vulnerabilities: {{item}} ({{version}}) is affected by published advisories ({{ids}}; severity {{severity}}). It is not shipped, but reviewers build the add-on from source, so it runs on the reviewer's machine during the build. Update {{item}} to {{fixed}} or later and resubmit.

# Deterministic (SCA only): the build must use npm or pnpm - the two package managers
# that share the .npmrc config format, keeping the reviewable surface small. A committed
# yarn/bun fingerprint anywhere in the build corpus (a lockfile, or the package.json
# "packageManager" field) is a hard reject; the offending tool is surfaced as {{item}}
# and the finding anchors at the fingerprint file. Pinning is a separate check
# (unpinned-dependency); the open-ended build review is undeclared-build-source.
- title: Unsupported build tool
  severity: error
  sca: true
  check: unsupported-build-tool
  input: build
  response: |-
    This add-on is built with {{item}}; only npm and pnpm are supported. Please provide an npm or pnpm build (commit a package-lock.json or pnpm-lock.yaml) so the dependency install can be reviewed against the declared dependencies.

# Deterministic (SCA only): a committed .npmrc that SETS a package registry (registry=
# or @scope:registry=, case-insensitive) is rejected outright - a legitimate build never
# needs to set the registry (npm defaults to the public one), and any setting can only
# point the install at another source, pulling the SAME declared package names from an
# UNDECLARED source and leaving package.json/lock a clean decoy. The value is not parsed;
# the raw value is surfaced as {{item}}. Every .npmrc in the build corpus is scanned (a
# build can run from a subfolder), and .npmrc is the one dotfile kept there.
- title: Build registry override
  severity: error
  sca: true
  check: build-registry-redirect
  input: build
  response: |-
    The .npmrc sets a package registry ({{item}}), which is not allowed. Remove the registry setting - the build must resolve every dependency from the default public npm registry (registry.npmjs.org). A custom registry pulls the declared package names from an undeclared source, making package.json and the lock file a decoy.

# Deterministic (SCA only): a node_modules folder anywhere in --sca-root is a hard
# reject. Installed dependencies are build output - the reviewer installs them from the
# declared package.json/lock - so a committed node_modules is useless bloat and a decoy
# (its bytes can differ from the declared deps). node_modules is never read: the loader
# skips it at load and records only the directory paths, surfaced here as {{item}}.
- title: Committed node_modules folder
  severity: error
  sca: true
  check: committed-node-modules
  input: build
  response: |-
    A committed node_modules folder ({{item}}) is not allowed. Remove it and resubmit; the declared dependencies are installed from package.json/lock during the build, so node_modules must never be part of the submission.

# Deterministic (SCA only): a committed binary archive (.zip/.xpi/.crx/...) anywhere in
# --sca-root is a hard reject. A built archive is build output the reviewer reproduces from
# source, so a committed one is useless bloat and a decoy (its bytes can differ from what the
# build produces). Recorded at load, spanning the whole submission, and surfaced as {{item}}.
- title: Committed build artifact
  severity: error
  sca: true
  check: committed-build-artifact
  input: build
  response: |-
    A committed build artifact ({{item}}) is not allowed. Remove it and resubmit; a built archive (a .xpi/.zip) is produced from the source during the build and must never be part of the submission, where its bytes cannot be verified against what the build produces.

# Deterministic (SCA only): a package.json install lifecycle hook (preinstall / install /
# postinstall / prepare / prepublish) runs arbitrary code when the reviewer installs the
# dependencies, BEFORE the build - a known supply-chain vector (a postinstall that fetches
# and runs remote code). Legitimate uses exist (a husky `prepare`), so this is a warning
# pointing the reviewer at each hook, not a hard reject. The setup build analysis also
# covers hooks, but only with a token; this is the offline backstop. {{item}} is the hook
# name and its command.
- title: Build install hook
  severity: warning
  sca: true
  check: build-lifecycle-hook
  input: build
  response: |-
    The package.json declares an npm install lifecycle hook ({{item}}) that runs when the reviewer installs the dependencies, before the build. Confirm it only runs local build steps and does not fetch or execute remote code (curl/wget, a download-and-run, or a git clone of an unpinned repo).

# Deterministic (SCA only): MISSION 1 of the build review. analyzeBuild classifies the build
# ONCE in setup (src/build/analyze.js), storing addon.buildFiles.buildReview; this
# check reads it. classification "remote-fetch" -> an error finding: the build fetches or
# executes code/resources from an UNDECLARED external source (a raw URL, curl|sh, a git clone of
# an unpinned repo, a CDN, a postinstall hook). Only installing the declared dependencies (npm
# ci from node_modules, importing a declared package) is allowed. This check also owns the
# FALLBACK lane: a build that could not be classified with confidence - offline / no token
# (analyzed = false), or a step the linter could not statically bound (unresolved) - escalates
# the whole build to extended manual review. Neutral title: the one entry drives BOTH the
# remote-fetch error and the fallback advisory; {{explanation}} carries the specifics, and
# {{buildInstructions}} + {{unresolvedBuildSteps}} render only in the manual instructions.
- title: Build process review
  severity: error
  sca: true
  check: undeclared-build-source
  input: build
  instructions: |-
    Reproduce the build from the source by hand and confirm it pulls ONLY from the
    dependencies declared in package.json/lock - no remote code or resources from a raw
    URL, curl/wget, a git clone of an unpinned repo, a CDN, or a postinstall hook.
    {{unresolvedBuildSteps}} {{buildInstructions}}
  response: |-
    {{explanation}} The build must not fetch or execute code or resources from a remote source; every part of the build must come only from the dependencies declared in package.json/lock (resolved from npm or the committed lock file).

# Deterministic (SCA only): MISSION 2 of the build review. Reads the setup classification
# (addon.buildFiles.buildReview). classification "not-from-source" -> error: the build does not
# build - it only copies/zips files already in the submission into the XPI, so the shipped add-on
# is not derived from the reviewed source. {{explanation}} is analyzeBuild's reason.
- title: Build not derived from source
  severity: error
  sca: true
  check: build-not-from-source
  input: build
  response: |-
    {{explanation}} The shipped XPI must be BUILT from the reviewed source; a build that only copies or zips files already present in the submission produces an add-on that is not derived from the source under review. Provide a build that compiles/bundles the add-on from its source.

# Deterministic: a submitted source-code archive (--sca-root) was unnecessary because the shipped
# XPI is directly reviewable (its first-party code is not minified or obfuscated). The pipeline
# decides this from the built XPI's own classification (hasUnreviewableCode over xpiAddon.bundled)
# and downgrades to a plain XPI review, setting ctx.scaNotRequired, which this check reports. A
# readable XPI whose build merely copies vendored libraries is caught here too - it downgrades
# before the build review runs. No `sca:` gate - it fires in the downgraded XPI review; silent in
# every other review.
- title: Source archive not required
  severity: warning
  check: sca-not-required
  input: source
  response: |-
    The shipped add-on (the built XPI) is directly reviewable - its code is not minified or obfuscated - so a separate source-code archive is not required, and the review was performed on the submitted XPI directly. Submitting a source-code archive switches the add-on into a separate, more involved review process that is considerably slower to complete; because your shipped code is already human-readable, you can avoid that delay by submitting only the XPI as a standard review. A source-code submission is needed only when the shipped code is minified or otherwise not human-readable.

# A vendored library the pre-step could not match to an npm package (src/vendor/
# verify.js auditGithub tries the deterministic repo-name candidate, then an
# LLM-proposed name, each re-proved by content hash); surfaced as info so the
# reviewer knows it went unaudited. The source URL renders on the location line
# (as the finding's item), so the body needs no {{item}}/{{source}} slots.
- title: Vendored library not vulnerability-checked
  severity: info
  sca: false
  check: vendor-vuln-unknown
  input: source
  response: |-
    The add-on sourced a third-party file from a CDN, where its known-vulnerability status could not be determined automatically. To benefit from automated auditing against the OSV database, consider switching to an npm-hosted source and update your vendor mechanism to point to an unpkg or jsDelivr package (pinned to an exact version).
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.

- title: Unpinned vendored source
  severity: error
  sca: false
  check: unpinned-vendor-source
  input: source
  response: |-
    The vendored file {{item}} cites a source that is not pinned to an immutable version. It is linked to a branch or unversioned URL rather than a specific release. Link to a specific version, tag, or commit so the file can be verified against the exact bytes it was copied from.

- title: Modified vendored library
  severity: error
  sca: false
  check: vendor-modified
  input: source
  response: |-
    A bundled third-party file does not match its declared source: {{item}} does not match the bytes its declared source ({{url}}) serves, so it appears to have been modified from the upstream release. Ship the file exactly as the source publishes it, or correct the declared source to the release the file actually came from.

# A deterministic check that escalates the declarations it cannot settle
# automatically to manual review (its `instructions`); it emits no findings, so
# it carries no severity.
- title: Vendored library needs manual verification
  sca: false
  check: vendor-unverified
  input: source
  response: |-
    The following bundled third-party file(s) could not be automatically verified against their upstream source. For each, make sure your vendor mechanism gives the library’s exact upstream version and a source URL that pins that release on a trusted host (unpkg, jsDelivr, an npm-registry tarball, or a raw GitHub URL), and that the bundled copy is unmodified, so it can be verified automatically.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/vendoring.html.
  instructions: |-
    The following declared third-party (vendored) file(s) could not be verified
    automatically. Confirm by hand that each is an unmodified copy of a
    library obtained from a trustworthy source.

# Flags a VENDOR entry (file + source URL) whose file is absent from the package.
- title: Missing vendored file
  severity: warning
  sca: false
  check: missing-vendor-file
  input: source
  response: |-
    One or more files listed in "{{item}}" are not present in the submission. Add each file to the submission, or remove its entry from "{{item}}".

# Flags a VENDOR file that exists but yields no parseable entry (no block pairs a
# bundled library file with a source URL pointing to a file), so the declared
# libraries cannot be verified.
- title: Unparseable VENDOR file
  severity: error
  sca: false
  check: vendor-unparseable
  input: source
  response: |-
    A VENDOR file is present but no third-party library could be parsed from it. List each bundled library in its own block as the packaged file path together with a source URL that points to the exact file (on unpkg, jsDelivr, the npm registry, or a raw GitHub URL), so it can be verified automatically.

# Flags a single source URL declared as the source of more than one bundled file -
# a file source can verify only one file, so the pairing is ambiguous. A multi-file
# library must be declared as a directory with a single directory source.
- title: Ambiguous vendored source
  severity: error
  sca: false
  check: vendor-ambiguous-source
  input: source
  response: |-
    A single source URL ({{item}}) is declared as the source of more than one bundled file ({{files}}). A file source can only verify one file, so the pairing is ambiguous. Give each file its own source URL, or - if they come from one place - declare the containing directory together with a single directory source URL.

# Flags data smuggled out through a channel not meant for it - always an error,
# regardless of consent. One check per channel (resource/stylesheet/window/
# navigation); all read the shared outbound-sink scan.
- title: Disguised data transmission (resource)
  severity: error
  check: disguised-resource
  input: source
  response: |-
    This add-on appears to send data through a resource URL (image/iframe/media src) - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (stylesheet)
  severity: error
  check: disguised-stylesheet
  input: source
  response: |-
    This add-on appears to send data through a stylesheet or CSS url() - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (window)
  severity: error
  check: disguised-window
  input: source
  response: |-
    This add-on appears to send data through a window.open() to a remote URL - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (navigation)
  severity: error
  check: disguised-navigation
  input: source
  response: |-
    This add-on appears to send data through a page navigation - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

# Flags data transmitted to a remote host over an unencrypted (http/ws/ftp)
# connection - any cleartext transmission, whatever the payload.
- title: Unencrypted data transmission
  severity: error
  check: cleartext-transmission
  input: source
  response: |-
    Data is sent over an unencrypted connection to {{item}}. All data must travel over an encrypted channel - use https:// (or wss:// for sockets), never http://, ws:// or ftp://.

# Preflight -> manual review: data sent to a hardcoded remote host means the
# listing must carry a privacy policy, which is not part of the package.
- title: Remote data transmission needs a privacy policy
  check: privacy-policy
  input: source
  response: |-
    Please add a privacy policy to this add-on that details which user data is being sent and to what services. The critical things to describe in the policy are how your extension collects, uses, stores, shares or discloses information about people. If your add-on makes it apparent to websites that it is installed, this must also be mentioned. The policy should be about the extension only, not a copy of the website’s privacy policy. It should also be the actual text, as opposed to a link to a privacy policy on a website. The privacy policy can be added in the add-on settings under "Manage Authors & License" on addons.thunderbird.net. For more information, please check our Review Policies [1], and Mozilla’s own privacy policy [2] as an example.

    [1]: https://thunderbird.github.io/atn-review-policy/#data-disclosure-collection-and-management
    [2]: https://www.mozilla.org/en-US/privacy/
  instructions: |-
    This add-on transmits data to one or more hardcoded remote servers. Confirm
    the ATN listing carries a privacy policy that discloses what data is
    collected and why. The privacy policy must be pasted into the ATN field
    directly (links to remotely hosted policies are not allowed).

# Preflight -> manual review: the nativeMessaging permission lets the add-on talk
# to a native application that is not part of the package.
- title: Native messaging needs disclosure
  check: native-messaging
  input: manifest
  response: |-
    This add-on requests the "nativeMessaging" permission to exchange messages with a native application outside Thunderbird. This must be disclosed on the ATN listing page, including what information is exchanged. The native host itself does not need to be part of the package.
  instructions: |-
    This add-on requests the "nativeMessaging" permission. Confirm the add-on
    listing page on ATN discloses what information is exchanged with the local
    app and that it complies with the No Surprises policy. The native host
    itself does not need to be part of the package.

# A packaged _locales directory requires a default_locale key, or Thunderbird
# will not load the add-on.
- title: Missing default_locale
  severity: error
  check: default-locale-missing
  input: xpi
  response: |-
    A _locales directory is present but the manifest declares no default_locale, so Thunderbird will refuse to load the add-on. Add a default_locale naming the fallback locale (e.g. "en").

# A default_locale key requires a packaged _locales directory, or Thunderbird
# will not load the add-on.
- title: Unused default_locale
  severity: error
  check: default-locale-unused
  input: xpi
  response: |-
    The manifest declares default_locale but the add-on ships no _locales directory, so Thunderbird will refuse to load the add-on. Add the _locales/<lang>/messages.json files, or remove default_locale.

# An extension with no top-level `icons` key ships no defined add-on icon, so
# Thunderbird shows the generic puzzle-piece placeholder in the Add-ons Manager.
# Advisory only (info); static themes and dictionaries are exempt (see the check).
- title: Add-on icon missing
  severity: info
  check: addon-icon-missing
  input: manifest
  response: |-
    Adding an add-on icon in manifest.json improves user acceptance.
    Read more: https://developer.thunderbird.net/add-ons/mailextensions/supported-manifest-keys#icons

# A background script using ES module syntax needs the background declared
# "type": "module", or it will not load.
- title: Background script needs type module
  severity: error
  check: background-module
  input: xpi
  response: |-
    The following background code location(s) use ES module syntax (import/export), but the manifest’s background is not declared "type": "module", so Thunderbird will fail to load the background script(s). Add "type": "module" to the background entry.

# A background PAGE (background.page HTML) whose <script src> loads module-syntax
# JS but is not declared type="module" - the page fails to load that script.
- title: Background page script needs type module
  severity: error
  check: background-page-module
  input: xpi
  response: |-
    The following background page code location(s) load a script that uses ES module syntax (import/export), but the <script> tag is not declared type="module", so Thunderbird will fail to load the background page. Add type="module" to the <script> tag.

# Dynamic code execution: the definite cases are deterministic (eval / Function
# constructor / code-string timers, and unsafe-eval/unsafe-inline in the CSP);
# the ambiguous fetch().then(eval) case is the remote-eval llm check below. All
# read the shared dynamic-execution scan. The eval/Function/timer/fetch-eval file
# scan only covers code OUTSIDE the pure WebExtension tree: a WebExtension sandbox
# cannot run these without a permissive CSP (the unsafe-eval/unsafe-inline checks
# report that), so only privileged Experiment / non-WebExtension code is scanned.
- title: eval() usage
  severity: error
  check: eval-call
  input: source
  response: |-
    Dynamic code execution via "eval()" is not allowed.

- title: Function constructor usage
  severity: error
  check: function-constructor
  input: source
  response: |-
    Dynamic code execution via "the Function constructor" is not allowed.

- title: Code-string timer
  severity: error
  check: string-timer
  input: source
  response: |-
    Dynamic code execution via "a code string passed to setTimeout/setInterval" is not allowed.

- title: CSP allows 'unsafe-eval'
  severity: error
  check: csp-unsafe-eval
  input: manifest
  response: |-
    Dynamic code execution via "content_security_policy 'unsafe-eval'" is not allowed.

- title: CSP allows 'unsafe-inline'
  severity: error
  check: csp-unsafe-inline
  input: manifest
  response: |-
    Dynamic code execution via "content_security_policy 'unsafe-inline'" is not allowed.


# Deterministic check: user-facing text hardcoded in a non-English language when
# the add-on ships no English _locales. franc detects the language over the HTML
# visible text and the manifest name/description (see the check). A confident
# non-English result is the finding. Too little or ambiguous text routes to
# manual review via `instructions`.
- title: Missing English localization
  severity: warning
  check: missing-english-localization
  input: xpi
  post-summary-recheck: missing-english-localization-recheck
  instructions: |-
    This add-on ships no English localization, so user-facing text may be
    hardcoded in another language. Review its strings by hand and confirm if an
    English localization is provided.
  response: |-
    Please include an English localization. English serves as the default language in Thunderbird, and most users who do not understand the hardcoded language will most likely be able to read English. The i18n API allows defining strings for multiple locales, and Thunderbird automatically selects the one that best matches the user’s interface language.
    An example can be found here: https://github.com/thunderbird/webext-examples/tree/master/manifest_v2/i18n

# Grounding for the unused-permission recheck consumer (permission-recheck: true).
# The --llm-review pass assembles its rubric as: framing.preamble + the prompt of
# every permission-prompts entry whose `permissions` intersects the permissions
# actually handed over (deduped, in order) + a "sites to judge" list + framing.closing.
# So the model is only ever sent grounding for the permissions in play - not the whole
# catalogue. Each entry may carry min_strict_version / max_strict_version (an INCLUSIVE
# bound on the add-on's strict_min_version, compared at the bound's own precision - so
# "153" covers the whole 153.* series; adjacent major bounds partition with no gap; an
# unset version is treated as oldest). No entry currently sets a bound; the
# tabs/activeTab version pivot instead lives in the `tabs.query` schema-annotation
# notes, pulled in version-matched via the {{note:tabs.query}} placeholder in the single
# tabs entry's prompt - before Thunderbird 154, filtering tabs.query by url/title needs
# "tabs" even for the add-on's own pages; at/after 154 it does not. Every name in a
# `permissions`
# list must appear in that entry's `prompt` (a test enforces this - an ungrounded
# permission just reintroduces guessing).
# An entry may declare `tokens`: the code-level spellings (API property names,
# manifest keys, literal strings) of every usage its prompt names as justifying.
# The unused-permission producer scans the add-on's live code (comments excluded)
# and manifest for them and records WHERE each occurs: a permission whose
# version-matched entries declare tokens and whose tokens ALL appear nowhere is
# deterministically unused - a warning finding without any model involvement. When a
# token DOES occur, each occurrence is a SITE the model judges one by one (does the
# permission get exercised there?), so the model reasons about a concrete line, never
# a bare yes/no over the whole add-on. An entry WITHOUT tokens (unlimitedStorage:
# quota/OPFS use is not token-detectable) has no site to point at, so its permissions
# escalate to a single holistic verdict over the full add-on.
# Token matching is CASE-SENSITIVE and on WORD BOUNDARIES (\btoken\b) over each
# source's code atoms and the manifest serialized as JSON (key names and values,
# including the permissions array itself - a test enforces that no token matches
# its own entry's permission declaration, or the declaration would self-ground and
# the entry would be silently inert). A token must therefore be a whole
# identifier / key / string word: `folder` matches a bare `.folder` read but not
# `displayedFolder`, so EVERY justifying spelling the schema gates on the
# permission - including each camelCase gated PROPERTY name - is listed
# explicitly. A missed spelling turns a used permission into a false "unused"
# finding, while an extra spelling merely widens escalation, so list generously.
permission-prompt-framing:
  preamble: |-
    The permissions below are declared in this add-on's manifest but static analysis
    could not confirm they are used. The full add-on code is shown above, each source
    line-numbered. Under "Sites to judge" you are given the concrete items to verdict.
    An item is one of two kinds:
    - A code SITE, written `<id>: "<permission>" token "<tok>" at <file>:<line>`. The
      token at that line is already known to be strongly associated with the permission,
      so the site is a genuine CANDIDATE - do not dismiss it as unrelated or "not really
      using the permission". The only open question is the discriminator: does THIS site
      meet the permission's specific criteria below? For an injection permission that is
      whether the injection targets the right kind of tab (a compose tab for "compose", a
      message-display tab for "messagesModify"); for a property permission it is whether
      the code really reads the gated data. Look at the line and the surrounding code and
      answer only that.
    - A HOLISTIC item, written `<permission>: no specific site ...`: the permission has
      no pinpointable token, so judge from the whole add-on whether it is exercised at
      all.

    Return one recheck entry per id. verdict pass = this site meets the criteria (the
    permission IS exercised here; for a holistic item, anywhere in the add-on); fail = it
    does not (e.g. the injection targets a normal web/content tab, not the required tab
    kind); unsure = you genuinely cannot tell from the code. unsure is the default whenever
    the criteria do not clearly settle it. But "the tab kind is not visible at the injection
    line" is not itself grounds for unsure if the tabId's origin is traceable elsewhere in
    the code - trace it. unsure already routes the permission to manual review, so the reason
    must not ask for manual or "main" review; just pick the verdict. Ignore comments, TODOs,
    documentation, and any stated or implied intention of future use.
  closing: |-
    For each id, take the candidate as given and answer only the discriminator: does the
    current code at that site (or, for a holistic item, anywhere in the add-on) actually
    meet the matching permission's criteria?

permission-prompts:
  - permissions: accountsRead
    # Every name the schema gates on accountsRead, listed explicitly: tokens match
    # on word boundaries, so a broad `folder` would NOT catch the camelCase
    # spellings (additionalFccFolder, displayedFolder, ...). Derived from the
    # schema's <permission>accountsRead</permission> property/parameter annotations.
    tokens:
      - folder
      - folderId
      - additionalFccFolder
      - additionalFccFolderId
      - displayedFolder
      - displayedFolderId
      - selectedFolder
      - selectedFolders
      - overrideDefaultFcc
      - overrideDefaultFccFolder
      - overrideDefaultFccFolderId
      - identityId
      - selectedAccount
    prompt: |-
      "accountsRead" is justified by reading, setting, or filtering by a folder or
      account identity: a message header's folder; a composed message's identityId,
      additionalFccFolderId, or overrideDefaultFccFolderId; the folder a mail tab
      displays or is set to display (displayedFolder / displayedFolderId); the
      displayedFolder or selectedFolders a menus context click or show reports; or
      limiting messages.query to a folder with folderId.
  - permissions: management
    tokens:
      - extensionId
    prompt: |-
      "management" is justified by reading the extensionId of a space, or filtering
      spaces.query by extensionId.
  - permissions: messagesRead
    # `attachments` covers the messagesRead-gated attachments property a menus
    # OnClickData/OnShowData reports.
    tokens:
      - relatedMessageId
      - onAfterSend
      - onAfterSave
      - selectedMessages
      - attachments
    prompt: |-
      "messagesRead" is justified by reading a composed message's relatedMessageId
      (the original message of a reply, forward, draft or template), the message
      copies passed to compose.onAfterSend or onAfterSave, or the selectedMessages
      a menus context click reports.
  - permissions: cookies
    tokens:
      - cookieStoreId
    prompt: |-
      "cookies" is justified by opening a tab or window in a specific container by
      passing cookieStoreId to tabs.create, windows.create, spaces.create or
      spaces.update (reading cookieStoreId needs no permission).
  - permissions: webRequestBlocking
    tokens:
      - blocking
    # The example event `onAfterSendHeaders` below is DELIBERATELY fictional (real ones are
    # onBeforeSendHeaders / onSendHeaders / onBeforeRequest / ...): it forces the model to
    # match the PATTERN (a webRequest.on* addListener with "blocking" in an array arg) and
    # apply it to the real event in the code, not echo the example. Do NOT "correct" it.
    prompt: |-
      "webRequestBlocking" is justified by a webRequest.on* addListener call that passes
      the string "blocking" inside one of its ARRAY arguments (the extraInfoSpec array), e.g.
      onAfterSendHeaders.addListener(fn, {urls}, ["blocking", "requestHeaders"]). The
      "blocking" string sits INSIDE that array - it is not a standalone argument and its
      position varies by event, so look inside the array arguments. A call with no "blocking"
      entry in any array argument does NOT justify the permission.
  - permissions: unlimitedStorage
    prompt: |-
      "unlimitedStorage" gates no API or property; it raises the browser's storage
      quota. It is justified when the add-on persists non-trivial data - through
      storage.local, IndexedDB, the Cache API, or the Origin Private File System. It
      has no single site to point at, so this item is judged holistically: pass if the
      add-on persists such data anywhere, fail if it does not.
  # The Thunderbird-154 own-page exemption is version-dependent, so it lives as two
  # bounded `note` annotations on tabs.query (assets/schema-annotations/tabs.json) and
  # is pulled in version-matched via {{note:tabs.query}} - one entry, no version bound.
  - permissions: tabs, activeTab
    tokens:
      - query
      - url
      - title
      - favIconUrl
      - overrideContext
      - onUpdated
    prompt: |-
      The tabs methods (tabs.query, tabs.create, tabs.update, tabs.remove, tabs.sendMessage,
      the tabs events) need NO permission by themselves. Reading a tab's privileged url,
      title, or favIconUrl - or filtering tabs.query by them - needs "tabs" (any tab),
      a host permission matching the tab's url (matching tabs only), or "activeTab"
      (for the active tab). {{note:tabs.query}} The "tabs" permission is also required by a
      tabId passed to menus.overrideContext and by a urls filter on tabs.onUpdated.
      A broad host permission like "<all_urls>" usually makes "tabs" redundant for reads.
  - permissions: activeTab
    # Namespace-qualified (dotted) tokens: matched against the resolved api-usage
    # (tabs.executeScript vs scripting.executeScript), not a bare `executeScript` word -
    # so only real injection CALLS count, never a stray identifier.
    tokens:
      - tabs.executeScript
      - tabs.insertCSS
      - scripting.executeScript
      - scripting.insertCSS
    prompt: |-
      The "activeTab" permission is justified, if a script or CSS is injected into an active
      CONTENT tab (a web page) by ANY of the following methods: tabs.executeScript, tabs.insertCSS,
      scripting.executeScript or scripting.insertCSS. A host permission matching the tab's url
      (e.g. "<all_urls>") is the alternative and makes "activeTab" redundant.
  - permissions: compose
    # The injection tokens are namespace-qualified (dotted): resolved against the
    # api-usage analysis, so only real tabs.*/scripting.* calls count. `attachments` is a
    # bare property token (a menus OnClickData/OnShowData read). The compose_scripts
    # manifest key is NOT a token here: it grounds compose deterministically (its
    # required_permissions annotation, before this recheck), so the LLM never judges it.
    tokens:
      - tabs.executeScript
      - tabs.insertCSS
      - scripting.executeScript
      - scripting.insertCSS
      - attachments
    prompt: |-
      The "compose" permission is justified when a script or CSS is injected into a
      COMPOSE tab (a message being composed) via tabs.executeScript, tabs.insertCSS,
      scripting.executeScript or scripting.insertCSS. A tab is a compose tab when its
      tabId comes from compose.* (onComposeStateChanged, beginNew/beginReply/beginForward,
      getComposeDetails) or a composeAction / compose_action button. The name of the injected
      tabId argument can corroborate this - e.g. a variable or parameter named composeTabId -
      though a name alone is a hint, not proof.
  - permissions: messagesModify
    # Namespace-qualified (dotted) injection tokens, resolved against the api-usage
    # analysis. message_display_scripts is NOT a token here: it grounds messagesModify
    # deterministically (its required_permissions annotation), so the LLM never judges it.
    tokens:
      - tabs.executeScript
      - tabs.insertCSS
      - scripting.executeScript
      - scripting.insertCSS
    prompt: |-
      The "messagesModify" permission is justified when a script or CSS is injected into a
      MESSAGE-DISPLAY tab (a tab showing a mail message) via tabs.executeScript,
      tabs.insertCSS, scripting.executeScript or scripting.insertCSS. A tab is a
      message-display tab when its tabId comes from messageDisplay.* (onMessageDisplayed,
      getDisplayedMessage[s]), a messageDisplayAction / message_display_action button, or a
      mailTab whose displayed message is being read. The name of the injected tabId argument
      can corroborate this - e.g. a variable or parameter named messageTabId - though a name
      alone is a hint, not proof.
  # No "scripting" entry: unlike compose/messagesModify (which need the semantic judgment
  # of WHICH kind of tab the injection targets), "scripting" is guarded at the namespace
  # level (the scripting schema namespace declares permissions: ["scripting"]), so ANY
  # scripting.* call grounds it deterministically in analyzePermissions - there is no
  # ambiguous case for the LLM to judge. It is also grounded by the message_display_scripts
  # manifest key (before Thunderbird 154). A declared-but-unused scripting therefore has no
  # prompt here and falls to manual review, like any other permission the recheck cannot judge.

# An llm-check carries a `prompt` (the rubric sent to the LLM for an ambiguous
# case) and an `instructions` (the message printed when the case is routed to
# manual review instead - no token, the LLM is unsure, or it errored). A
# confident LLM "fail" emits a normal finding rendered from `response`.
llm-phase:
# Flags shipped obfuscated JS that is not a recognized library; asks for the
# original sources. A strong structural detector match is a deterministic finding;
# a weak-only match (a structure ordinary readable code also has - see
# src/lib/obfuscation.js WEAK_FAMILIES) becomes an LLM candidate judged by the
# prompt below (fail -> finding, unsure -> manual review via the instructions,
# pass -> drop). The prompt deliberately never mentions the structural detector or
# what it matched, so the model judges the file cold and cannot be steered into
# confirming a detector claim.
- title: Obfuscated code is not permitted
  severity: error
  check: obfuscated-code
  input: source
  prompt: |-
    Each candidate is one packaged JavaScript file. Read the file and judge only
    whether it is genuinely obfuscated - code transformed to hide its behavior
    from a human reviewer.
    Verdict fail (the file is obfuscated): machine-mangled identifiers (such as
    _0x1a2b), encoded or rotated string tables resolved through decoder
    indirection, control-flow flattening, or similar transformations whose
    purpose is to make the code unreadable.
    Verdict pass (the file is not obfuscated): readable developer code with
    meaningful names and ordinary structure - even if it is dense, compact, or
    minified; minification alone is judged elsewhere and is not obfuscation.
    Use unsure only when you genuinely cannot tell.
  instructions: |-
    The automated analysis could not determine whether the following file(s) are
    obfuscated. Inspect them by hand.
  response: |-
    The following file(s) are obfuscated. Extensions using obfuscated code are not permitted, regardless of whether they are hosted on addons.thunderbird.net (ATN) or not. Extensions using obfuscated code are in violation of our Add-on Policy and are subject to being blocked.
    Please read the instructions: https://extensionworkshop.com/documentation/publish/source-code-submission/

# LLM check: functions/events added after the declared strict_min_version. The
# deterministic pre-flight (strict-min-version-api.js) emits an UNGUARDED too-new
# call as a finding directly; a call carrying a guard signal (optional chaining, a
# typeof/existence check, a getBrowserInfo version gate) becomes one candidate the
# LLM judges from the call's file: pass (safely guarded) -> drop, fail (runs
# unconditionally) -> finding, unsure -> manual. Only real, schema-resolved APIs
# reach here; a non-existent API is unknown-api's concern.
- title: API newer than strict_min_version
  severity: error
  check: strict-min-version-api
  input: source
  prompt: |-
    Each candidate is a call site of a WebExtension API that DOES exist and is
    supported, but was added in a Thunderbird newer than the add-on's declared
    strict_min_version (the candidate's note names the API and the version it was
    added in). Do NOT question whether the API exists - it does. Decide only one
    thing from the shown file: is the call guarded so it runs ONLY on Thunderbird
    versions that actually have the API?
    Verdict pass (safely guarded): the access is protected so it cannot run on older
    versions - optional chaining on the API path (messenger.foo?.bar), an existence
    or typeof test (if (messenger.foo.bar) or typeof messenger.foo.bar ===
    "function"), or a runtime version gate (a messenger.runtime.getBrowserInfo()
    version comparison) around the call, with the feature genuinely optional or a
    fallback for older versions.
    Verdict fail (runs unconditionally): the API is called with no such guard, so the
    call throws on the still-supported versions below the one that added it.
    Use unsure only when you genuinely cannot tell whether a guard protects this call.
  instructions: |-
    The "{{item}}" API was added after the declared strict_min_version. Confirm by
    hand whether the call is safely guarded (feature detection or a version check) so
    it only runs where the API exists; if not, ask the developer to raise
    strict_min_version or guard the call.
  response: |-
    The add-on is setting strict_min_version to {{min}} but uses functions or events which were added later. Please adjust the value of strict_min_version accordingly.

# LLM check: hidden/junk files and files reachable from no entry point; the
# ambiguous (dynamically-loadable) ones are escalated to the LLM.
- title: Unused, hidden or duplicate files or folders
  severity: error
  check: unused-files
  input: xpi
  post-summary-recheck: unused-files-recheck
  prompt: |-
    Each candidate is a site in the add-on, named in its note as "does this site
    load F", where F is a packaged file not reachable from any manifest entry
    point. Decide only whether this site loads or uses F at runtime. A candidate is
    one of two kinds, which you can tell apart from the candidate list:
    - it has a file:line where the site names F (F's basename appears there); or
    - it has no line and is a runtime loader: code that builds load paths at
      runtime (a dynamic import, getURL, executeScript/insertCSS, setIcon, and the
      like), so it may load F WITHOUT naming F literally.

    Verdict pass (this site loads F): a static or dynamic import, a getURL or
    executeScript, an HTML or CSS reference, or a data or configuration entry the
    add-on consumes (for example one entry in a list of selectable sounds, themes,
    or icons). For a runtime loader, a runtime-built path that could plausibly
    resolve to F is enough: if the site builds paths like
    "icons/icon-${theme}-${size}.png" and F is one of those icons (same directory,
    extension, and naming family), treat F as loaded. It may load F only when a
    user chooses it, and a valid functional reference is enough.

    Verdict fail (this site does not load F): the mention is incidental (a comment,
    documentation, or packaging metadata the add-on does not consume), it is
    unrelated code, or it is a runtime loader whose built paths clearly target a
    different directory or file type than F (for example a loader that builds
    "icons/*.png" paths cannot load icon-source.svg).

    Use unsure only as a last resort, when you genuinely cannot tell. Do NOT answer
    unsure merely because F's literal filename does not appear here: a runtime
    loader need not name F, and a plausible runtime-path match is a pass. F's own
    contents do not matter, only whether this site loads it.
  instructions: |-
    The following files are not reachable from any entry point but may be loaded
    dynamically. Confirm by hand whether they are unused and safe to remove.
  response: |-
    The following file(s) or folder(s) appear to be unused or hidden. Such files complicate the review, may leak information about the system the XPI was built on, or needlessly increase the size of the add-on. Please correct your packaging process so they are not included.

# LLM check: over-broad or unloaded web_accessible_resources exposure.
- title: Minimize web_accessible_resources
  severity: warning
  check: minimize-web-accessible-resources
  input: xpi
  post-summary-recheck: minimize-web-accessible-resources-recheck
  prompt: |-
    Each candidate is a site (file:line) that references a web_accessible_resources
    file F, named in the candidate note as "does this site load F for a web
    context". web_accessible_resources is only needed when something OUTSIDE the
    add-on reads F: a content script (which runs in the web page's world), a real
    web page, or another extension. The add-on opening or embedding its own file
    or page from its own extension contexts (the background, a popup, sidebar,
    options or tab page, or an iframe of F inside another of the add-on's own
    pages) never needs it. For that candidate, decide only whether this site
    exposes F to such an external web context.

    Verdict pass (this site exposes F to a web context): the reference is in a
    content script, or it builds a URL or markup handed to a web page or another
    extension - a getURL, a fetch, an HTML or CSS reference, or a dynamic or
    data-built path reachable from such a context. A reference need not be a
    manifest entry point.

    Verdict fail (this site does not expose F): the reference is incidental or
    unrelated code, or F is loaded only by the add-on's own extension code (its
    background or its own pages, including an iframe of F inside one of them),
    which does not require web_accessible_resources.

    Use unsure only when you genuinely cannot tell.
  instructions: |-
    The following resources are exposed via web_accessible_resources but nothing
    in the add-on loads them. Confirm by hand whether they need to be exposed.
  response: |-
    One or more resources are registered as web_accessible_resources but may not need to be exposed. List files there only if a web page or content script must access them. Otherwise, remove these entries to reduce the add-on’s exposed surface.

# LLM check: remote resources - <script>/<link>/<iframe>/media in HTML,
# @import/url() in CSS, import()/importScripts()/module imports, runtime <script>
# injection, remote WASM, and a CSP that permits a remote source. The definite
# remote loads are flagged deterministically; only the statically-undecidable
# sources reach the model.
- title: Remote resources
  severity: error
  check: remote-resources
  input: source
  prompt: |-
    Each candidate is a site (file:line) that loads or injects a resource -
    script, style, frame, or media - from a source static analysis could not
    resolve to a bundled file. For each candidate, determine whether the resource
    comes from a remote source (verdict fail) rather than a packaged file (verdict
    pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    This site loads a resource from a source static analysis cannot resolve.
    Confirm by hand that it is bundled with the add-on and not fetched remotely.
  response: |-
    A resource is loaded from a remote source. Every resource - script, style, frame, and media - must be bundled with the add-on so it can be reviewed; remote sources are not allowed.

# LLM check: the statically-undecidable fetch().then(eval) case - is the executed
# code remote? The definite eval/Function/timer/CSP cases are deterministic
# checks above. Like them, the shared scan only covers code OUTSIDE the pure
# WebExtension tree (WebExtension code is CSP-gated, see unsafe-eval/unsafe-inline).
- title: Remote eval
  severity: error
  check: remote-eval
  input: source
  prompt: |-
    Each candidate is a site (file:line) that executes code built or fetched at
    runtime, such as fetch().then(eval). For each candidate, determine whether the
    executed code is fetched from a remote source (verdict fail) rather than
    static and local (verdict pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    "{{item}}" may execute code that is fetched at runtime. Confirm by hand that
    no remotely fetched code is executed.
  response: |-
    Remotely fetched code is executed at "{{item}}". Remote code execution is not allowed - bundle all code with the add-on so it can be reviewed.

# LLM check: normal transmission (fetch and friends) to a remote host - allowed
# only with an options-page opt-in, judged from the options page in evidence.
- title: User-data exfiltration
  severity: error
  check: data-exfiltration
  input: source
  post-summary-recheck: data-exfiltration-recheck
  prompt: |-
    Each candidate is a site (file:line) that sends data to a remote server (via
    fetch, XMLHttpRequest, WebSocket, EventSource, or sendBeacon). Sending user
    data such as message content, attachments, contacts, or credentials to a
    remote host is allowed ONLY if the user actively enabled it, by entering the
    destination URL or credentials on an options page that lists what is actually
    transmitted, or via an explicit off-by-default opt-in for a hard-coded URL.
    Thunderbird has no built-in data-collection consent prompt. The add-on’s
    options page, when it has one, is among the files below. For each candidate,
    determine whether user data is transmitted WITHOUT such consent (verdict fail)
    or not (verdict pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    The following code locations transmit data to a remote server. Confirm by
    hand that any user data they send is gated behind an explicit opt-in (a
    documented options-page setting) and is never sent without consent.
  response: |-
    The following code location(s) send user data to a remote server without an explicit opt-in. User data may be transmitted only when the user actively enables it on an options page that discloses what is sent.

# LLM check: the WEAK disguised-transmission residue - a covert channel (resource
# URL, stylesheet url(), window.open, or page navigation) built with a runtime
# value but no user-data API call. The strong case (a user-data call in the URL) is
# the deterministic disguised-* errors; this asks whether the dynamic URL is really
# an undisclosed data send or just legitimate dynamic URL building.
- title: Disguised data transmission
  severity: error
  check: disguised-transmission
  input: source
  post-summary-recheck: disguised-transmission-recheck
  prompt: |-
    Each candidate is a site (file:line) that builds a covert channel - a resource
    URL (image/iframe/media src or href), a stylesheet url(), a window.open(), or a
    page navigation (location.href/assign/replace) - to a remote host using a
    runtime value, with no obvious user-data API call in it. Disguising data
    transmission through a channel not meant for it (instead of a normal request)
    is not allowed, even with consent. But building a remote URL from a runtime
    value is also extremely common in legitimate code (navigating to a host path,
    loading a CDN asset by name). For each candidate, determine whether it actually
    smuggles user data (message content, attachments, contacts, credentials,
    browsing/usage data) out through this channel (verdict fail) or is a legitimate
    dynamic URL (verdict pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    The following code locations build a resource or navigation URL to a remote
    host with a runtime value. Confirm by hand whether any of them smuggle user
    data out through that channel rather than a normal, disclosed request.
  response: |-
    The following code location(s) appear to send data through a resource or navigation URL - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

# Post-summary recheck consumers. Each is the recheck TARGET named by a producer's
# `post-summary-recheck:` above. It is re-judged by the --llm-review add-on summary
# (phase post-summary), always runs on the main ctx - so it declares no `input` - and
# is labelled by its producer's corpus (see labelInputFor). Its run() is resolveRecheck.
post-summary-phase:
# The recheck consumer for the permissions handed over above. `permission-recheck`
# makes the --llm-review pass assemble a rubric from the permission-prompt-framing
# and permission-prompts sections, including only the sections for the permissions
# actually handed over and the tabs variant matching the add-on's strict_min_version.
# The model's verdict maps to justified (drop), unused (this warning), or unsure
# (manual review); it runs in the post-summary phase, inferred from being named as
# the post-summary-recheck target above. Both texts are deliberately item-free and
# reason-free: same-bodied findings collapse into one numbered entry with the
# permissions on the locus lines (like the producer's manual reminder), and the
# model's per-permission reasons appear only in the AI summary bullets.
- title: Unused permission
  severity: warning
  check: unused-permission-recheck
  permission-recheck: true
  response: |-
    One or more declared permissions are unused. An add-on should request only the permissions it needs, to keep the install-time permission prompt minimal. If a permission is in fact used, please specify which part of your add-on stops working if it is removed.
  instructions: |-
    One or more declared permissions may be unused. Confirm whether the add-on
    actually needs them, and if not, ask the developer to remove them.

# Recheck consumer for missing-english-localization (above): re-judges the
# low-confidence language case (too little text, or a near-tie with English) with a
# model reading ALL the user-facing text. pass -> English / nothing to localize
# (drop), fail -> a finding, unsure -> manual. Same wording as the producer;
# post-summary phase inferred.
- title: Missing English localization
  severity: warning
  check: missing-english-localization-recheck
  summary-prompt: |-
    The listed item (manifest.json) stands for the add-on's user-facing text - the
    manifest name and description plus the visible text of its HTML pages, all
    quoted among the sources above. Reading all of it together, decide: verdict fail
    = the user-facing text is hardcoded in a non-English language (an English
    localization should be added), pass = it is English, or there is nothing to
    localize, unsure = you genuinely cannot tell. Return a verdict for this item only.
  instructions: |-
    This add-on ships no English localization, so user-facing text may be
    hardcoded in another language. Review its strings by hand and confirm if an
    English localization is provided.
  response: |-
    Please include an English localization. English serves as the default language in Thunderbird, and most users who do not understand the hardcoded language will most likely be able to read English. The i18n API allows defining strings for multiple locales, and Thunderbird automatically selects the one that best matches the user’s interface language.
    An example can be found here: https://github.com/thunderbird/webext-examples/tree/master/manifest_v2/i18n

# Recheck consumer for unused-files (above): re-judges the files it could not
# resolve from a single site, now with the whole add-on in view. Its summary-prompt
# is appended to the --llm-review pass; pass -> loaded (drop), fail -> an unused
# finding, unsure -> manual review. Same wording as unused-files (its findings read
# identically); the post-summary phase is inferred from being its recheck target.
- title: Unused, hidden or duplicate files or folders
  severity: error
  check: unused-files-recheck
  summary-prompt: |-
    Each listed item is a packaged file not reachable from any manifest entry point
    that the per-file analysis could not resolve to a loader. With the whole add-on
    in view, decide whether ANYTHING in it loads or uses each file at runtime: a
    static or dynamic import, a getURL or executeScript/insertCSS, an HTML or CSS
    reference, a data or configuration entry the add-on consumes, or a runtime-built
    path that plausibly resolves to it (for example code building
    "icons/icon-${theme}-${size}.png" loads the icons in that family). Verdict pass
    = it is loaded somewhere (keep it), fail = nothing in the add-on loads it (it is
    unused and safe to remove), unsure = you genuinely cannot tell. Base each verdict on
    the provided add-on corpus; return one per listed file, by its packaged
    path, and add no others.
  instructions: |-
    The following files are not reachable from any entry point but may be loaded
    dynamically. Confirm by hand whether they are unused and safe to remove.
  response: |-
    The following file(s) or folder(s) appear to be unused or hidden. Such files complicate the review, may leak information about the system the XPI was built on, or needlessly increase the size of the add-on. Please correct your packaging process so they are not included.

# Recheck consumer for minimize-web-accessible-resources (above): re-judges the
# entries it could not clear from a single referencing site, now with the whole
# add-on in view. pass -> needed (drop), fail -> a needless-exposure finding,
# unsure -> manual. Same wording as the producer; post-summary phase inferred.
- title: Minimize web_accessible_resources
  severity: warning
  check: minimize-web-accessible-resources-recheck
  summary-prompt: |-
    Each listed item is a web_accessible_resources entry the per-site analysis
    could not clear. web_accessible_resources is only needed when something OUTSIDE
    the add-on reads the file: a content script (it runs in the web page's world), a
    real web page, or another extension. The add-on opening or embedding its own
    file or page from its own extension contexts (background, popup, sidebar,
    options or tab page, or an iframe of it inside another of the add-on's own
    pages) never needs it. With the whole add-on in view, decide for each entry:
    verdict pass = something external reads it (keep it), fail = nothing external
    reads it (it is needless and should be removed), unsure = you cannot tell. Base each
    verdict on the provided add-on corpus; return one per listed entry and
    add no others.
  instructions: |-
    The following resources are exposed via web_accessible_resources but nothing
    in the add-on loads them. Confirm by hand whether they need to be exposed.
  response: |-
    One or more resources are registered as web_accessible_resources but may not need to be exposed. List files there only if a web page or content script must access them. Otherwise, remove these entries to reduce the add-on’s exposed surface.

# Recheck consumer for data-exfiltration (above): re-judges each transmission site
# it could not clear, now with the whole add-on in view, so a user opt-in defined in
# any settings or background module is visible (not only the options page in the
# narrow corpus). pass -> consented (drop), fail -> an exfiltration finding, unsure
# -> manual. Same wording as the producer; post-summary phase inferred.
- title: User-data exfiltration
  severity: error
  check: data-exfiltration-recheck
  summary-prompt: |-
    Each listed item is a code location (file:line) that sends data to a remote
    server (fetch, XMLHttpRequest, WebSocket, EventSource, or sendBeacon). Sending
    user data such as message content, attachments, contacts, or credentials to a
    remote host is allowed ONLY if the user actively enabled it - by entering the
    destination URL or credentials on an options page that lists what is
    transmitted, or via an explicit off-by-default opt-in for a hard-coded URL.
    Thunderbird has no built-in data-collection consent prompt. With the whole
    add-on in view (every settings page, background flag, and stored preference),
    decide for each location: verdict fail = user data is transmitted WITHOUT such
    consent, pass = it is not, unsure = you cannot tell. Base each verdict on the
    provided add-on corpus; return one per listed location and add no
    others.
  instructions: |-
    The following code locations transmit data to a remote server. Confirm by
    hand that any user data they send is gated behind an explicit opt-in (a
    documented options-page setting) and is never sent without consent.
  response: |-
    The following code location(s) send user data to a remote server without an explicit opt-in. User data may be transmitted only when the user actively enables it on an options page that discloses what is sent.

# Recheck consumer for disguised-transmission (above): re-judges each weak covert
# sink it could not clear, now with the whole add-on in view. pass -> legitimate
# dynamic URL (drop), fail -> a disguised-transmission finding, unsure -> manual.
- title: Disguised data transmission
  severity: error
  check: disguised-transmission-recheck
  summary-prompt: |-
    Each listed item is a code location (file:line) that builds a covert channel - a
    resource URL, a stylesheet url(), a window.open(), or a page navigation - to a
    remote host using a runtime value, with no obvious user-data API call. With the
    whole add-on in view, decide for each location: verdict fail = it smuggles user
    data out through this channel, pass = it is a legitimate dynamic URL, unsure =
    you cannot tell. Base each verdict on the provided add-on corpus;
    return one per listed location and add no others.
  instructions: |-
    The following code locations build a resource or navigation URL to a remote
    host with a runtime value. Confirm by hand whether any of them smuggle user
    data out through that channel rather than a normal, disclosed request.
  response: |-
    The following code location(s) appear to send data through a resource or navigation URL - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

manual-checks:
# Manual: inspect the listing + add-on for spam, inappropriate, or low-effort
# content.
- title: Check the submission for spam
  check: check-submission-spam
  instructions: |-
    Inspect the listing (name, summary, description, screenshots) and the add-on
    itself. Determine if it looks like spam or contains inappropriate, misleading,
    or low-effort content.
  response: |-
    This add-on contains inappropriate content.

# Manual: exercise the add-on in a test profile; may need credentials or info.
- title: Test the add-on and request testing information if needed
  check: test-add-on
  instructions: |-
    Test the add-on’s functionality in a test profile, and check if it needs
    additional information like credentials in order to continue the review.
  response: |-
    Please provide us with detailed information on how to test this add-on. If authentication to a website is necessary, give us a test username and password to facilitate our work. This can be provided in the Whiteboard field, which can be found in the Edit Listing page under the Technical Details section. This information is only available to reviewers.

# Manual: behavior not documented on the ATN listing (inspect the version diff).
- title: Check for "No Surprises" policy violations
  check: no-surprises-policy
  instructions: |-
    Test the add-on’s functionality in a test profile and inspect the code for
    any unexpected features or behavior that is not documented on the ATN
    listing page and could be a surprise to the user. A diff against the last
    accepted version may be helpful.
  response: |-
    Your add-on includes a feature that is not related to its primary function and is not mentioned in the description of your add-on listing page on ATN (addons.thunderbird.net). This feature must be strictly opt-in: <name of feature>.

# Manual: payment is required but the ATN "needs payment" flag is off.
- title: Check for a missing payment disclosure
  check: missing-payment-disclosure
  instructions: |-
    Test the add-on’s functionality in a test profile. Verify whether the
    add-on requires a subscription or other form of payment to function but the
    "needs payment" flag on the add-on’s ATN listing page is not enabled.
  response: |-
    It looks like a payment is required to use this add-on or the service this add-on relies on, either upfront, after a trial period or in conjunction with a paid software. If so, we need to ask you to update the payment status to yes.

# Manual: limited/non-public audience (better self-hosted than publicly listed).
- title: Check suitability for listing
  check: suitability-for-listing
  instructions: |-
    Judge whether the add-on targets a limited or non-public audience (for
    example an internal, single-organization, or test-only add-on) and should
    better self-hosted than publicly listed on ATN.
  response: |-
    Due to its limited or non-public audience, this add-on is not suitable for listing on ATN (addons.thunderbird.net). Please consider self-hosting and distributing it yourself.

# Manual: name/summary/description/screenshots vs Mozilla’s Acceptable Use Policy.
- title: Acceptable Use Policy
  check: acceptable-use-policy
  instructions: |-
    Check the name, summary, description, and screenshots against Mozilla’s
    Acceptable Use Policy (https://www.mozilla.org/about/legal/acceptable-use/).
  response: |-
    The name, summary, description, and/or or screenshot(s) of this extension contain content that does not comply with Mozilla’s Acceptable Use Policy (https://www.mozilla.org/about/legal/acceptable-use/).

# Manual: icon imitating the Thunderbird/Mozilla logo (an image checks can’t see).
- title: Check the icon for trademark or logo imitation
  check: icon-trademark-imitation
  instructions: |-
    Inspect the add-on’s icon, if it imitates or incorporates the Thunderbird or
    Mozilla logo.
  response: |-
    This add-on’s icon imitates or incorporates a Mozilla trademark (the Thunderbird or Mozilla logo), which is not allowed under Mozilla’s Trademark Policy (https://www.mozilla.org/foundation/trademarks/policy/). Please use a distinct icon.

# Manual: the ATN listing page lacks usage details/entry points or screenshots.
- title: Missing ATN description or details
  check: missing-atn-description
  instructions: |-
    Verify that the add-on listing page on ATN includes detailed instructions on
    how to use the add-on and where to find its entry points. It should also
    include screenshots to help users quickly understand how the add-on works.
  response: |-
    The add-on listing page on ATN (addons.thunderbird.net) should include detailed instructions on how to use the add-on and where to find its entry points. Please also include screenshots to help users quickly understand how the add-on works.

# Manual: the ATN listing page should have an English version.
- title: Missing English ATN localization
  check: missing-english-atn-localization
  instructions: |-
    Verify that the ATN listing page also has an English version.
  response: |-
    The add-on listing page on ATN (addons.thunderbird.net) should also have an English localization. English serves as the default language in Thunderbird, and most users who do not understand the available non-English version will most likely be able to read English.

# Manual (new submissions only): is this a fork of an existing add-on that must be
# distinguished from the original? `diff: false` skips it when reviewing an update
# against a --diff-to baseline (an established listing is not a new fork).
- title: Forked add-on
  check: forked-add-on
  diff: false
  instructions: |-
    Check if the submission is a fork of an existing add-on. Such forks are only
    allowed on ATN if they are clearly distinguished from the original and
    provide a significant difference in functionality and/or code. Exceptions may
    be made where the add-on is no longer maintained by its original author. The
    primary goal, however, should be to connect the two developers and let the
    new developer help maintain or take over the existing add-on. In general,
    small-change forks of still-active projects cause confusion for users and
    unnecessary overlap for developers. We encourage developers to contribute
    their improvements directly to the original project.
  response: |-
    The submission appears to be a fork of an existing add-on that is still being actively maintained. According to our review policies (https://thunderbird.github.io/atn-review-policy/):

    "If the add-on is a fork of another add-on, the name must clearly distinguish it from the original and provide a significant difference in functionality and/or code. Exceptions may be made in instances where the add-on is no longer maintained by the original author."

    Because the original project is still active, your submission does not meet these requirements. Small-change forks can sometimes cause confusion for users and unnecessary overlap for developers. We encourage you to consider contributing your improvements directly to the original project so that all existing users can benefit from your ideas.

# Headings shown above each severity group in the report’s Issues section
# (numbering is continuous across the groups).
issue-headings:
  error: "The following findings caused the submission to be rejected:"
  warning: "We kindly ask you to resolve the following issues with your next release:"
  info: "We would like to share the following information with you:"


# System notices the orchestrator emits (not tied to one check): "{{item}}" is
# filled with the relevant check id / token. Keeps every printed string here.
messages:
  check-failed: |-
    The "{{item}}" check could not be run. The other checks still ran.
  llm-unavailable: |-
    "{{item}}" could not be evaluated automatically. Review this step by hand.

# The customer-facing preamble at the top of the report’s Issues section: "none"
# when there are no findings, "rejected" when there is any error finding, and
# "feedback" otherwise (warnings/info only). With findings, it is glued to the
# first severity heading; with none, it is the whole Issues body.
verdict-intros:
  none: "The automated review did not find any issues."
  feedback: "Thank you for your contribution, it will be approved shortly."
  rejected: "Thank you for your submission. We appreciate the effort you’ve put into creating this add-on. However, it cannot be accepted and hosted on addons.thunderbird.net in its current form."

# Tool-defining prompts the registry owns, like check rubrics and `messages`, so
# every model-facing string lives in this one file.
#   system-intro:   the fixed reviewer role prompt - the first system block of
#                   every LLM check call. It explains the fail/pass/unsure
#                   verdicts whose structured shape (the forced result tool) lives
#                   in src/llm/schema.js (RESULT_SCHEMA).
#   change-summary: the AI "Summary of changes" prompt. The orchestrator emits it
#                   only with --diff-to under --llm-review (which needs a configured
#                   LLM provider); the model’s prose is shown verbatim as an
#                   advisory aid (not a finding).
#   add-on-summary: the AI "Summary of add-on" prompt. Emitted only with
#                   --llm-review and a token; via the forced report_addon_review
#                   tool it returns prose (what the (almost) full current add-on
#                   does, with security notes and a permission review) plus the
#                   structured list of permissions that appear unused. The prose is
#                   advisory; the unused-permission list feeds the
#                   unused-permission check, which raises it as Issues. In SCA mode
#                   this pass judges only the source-anchored rechecks; the packaging
#                   rechecks go to shipped-package-summary below.
#   shipped-package-summary: the packaging-only "Summary of add-on" pass. In SCA
#                   mode it runs over the BUILT, shipped XPI corpus (only when an
#                   XPI-anchored recheck escalated) and judges just the packaging
#                   rechecks - reachable files, web_accessible_resources, English
#                   localization. Its prose is not shown to the reviewer; only its
#                   recheck verdicts are consumed.
#   vendor-parse:   the LLM fallback that parses a free-form VENDOR file into
#                   structured {file, url} declarations, used during vendor
#                   resolution when the deterministic scan comes up empty and a
#                   token is set (token-less stays deterministic).
#   vendor-npm-resolve: the LLM fallback that proposes the npm package a github-
#                   sourced vendored library is published as, so it can be OSV-
#                   audited. Used by verify.js when the deterministic repo-name
#                   match misses; the proposal is re-proved by content hash before
#                   any audit, so a wrong guess is harmless.
#   build-analysis: the SCA build review's one classification, run in setup
#                   (analyzeBuild) over the selected build corpus; returns
#                   {classification, reason, buildInstructions} stored on
#                   addon.buildFiles.buildReview for the three input:build checks.
prompts:
  system-intro: >-
    You are a Thunderbird WebExtension add-on reviewer. Each request gives you
    one review step (a rubric) and a numbered list of CANDIDATES, each an id
    pointing at a file:line site, together with the FILES they appear in. Judge
    every candidate and report by calling the report_verdicts tool with one entry
    per candidate id. For each id, return verdict='fail' when you are confident
    the issue this step looks for is present at that candidate, 'pass' when you
    are confident it is absent, and 'unsure' when you cannot be confident either
    way (a human then reviews it). Only give a definite verdict when you are
    genuinely confident, and prefer 'unsure' over guessing. Use the exact ids
    from the CANDIDATES list and never invent ids.
  change-summary: |-
    You are comparing two versions of a Thunderbird WebExtension add-on. Below is
    what changed from the previous to the current version (a file-level diff).
    Summarize the changes for a reviewer as a few concise bullet points: new or
    removed features, changed behavior, new permissions or APIs, and anything
    security- or privacy-relevant. Be factual and specific, and call out anything
    a user might find surprising. If nothing meaningful changed, say so.
  add-on-summary: |-
    Review this Thunderbird WebExtension add-on from its (almost complete) current
    sources below and report by calling the report_addon_review tool.
    The "summary" field is prose for a reviewer. Cover, as a few concise bullet
    points: what the add-on does (its main features), the notable APIs it uses, and
    how it interacts with the network or the user’s data. Then list any security- or
    privacy-relevant observations. Be factual and specific.
    Do not judge whether the add-on's permissions are used, unused, needed, or
    excessive - that review belongs to the formal findings and the permission
    recheck, not this summary. Describing behavior the manifest enables ("modifies
    messages") is fine; adjudicating a permission's usage is not. Assess a permission
    only when a "recheck:" section below lists it, and only the ones it lists; if no
    recheck section lists permissions, do not remark on any permission's usage at all.
    If the sources below end with one or more "recheck:" sections, also fill the
    "recheck" field. Each section names a check id and lists items to judge against
    that section's rubric; return one "recheck" entry per listed item, giving the
    matching check id, the exact item text, your verdict, and a one-sentence reason.
    Judge only the listed items and never add others.
    Each recheck section says how to surface its verdicts as a labeled bullet in the
    prose summary; follow that instruction for every section, so flagged items appear
    in the overview and not only in the structured result.
    This is an advisory overview. The formal findings in the review report above are
    authoritative, not this summary.
  shipped-package-summary: |-
    Review the BUILT, SHIPPED package of this Thunderbird WebExtension add-on from its
    files below and report by calling the report_addon_review tool. This pass judges
    only the PACKAGING questions about the shipped artifact that the "recheck:" sections
    below list - which packaged files are reachable at runtime, whether each
    web_accessible_resources entry is needed, and whether the user-facing text is
    localized. Do NOT assess the add-on's behavior, security, data flow, or permissions:
    that review is done separately over the readable source.
    Each recheck section names a check id and lists items to judge against that section's
    rubric; fill the "recheck" field with one entry per listed item, giving the matching
    check id, the exact item text, your verdict, and a one-sentence reason. Judge only
    the listed items and never add others. The "summary" prose field is not shown to the
    reviewer, so keep it brief.
  vendor-parse: |-
    The text below is an add-on’s VENDOR file: a developer’s free-form list of the
    bundled third-party library files it ships, each with the source URL it was
    copied from. Extract those declarations. Respond with ONLY a JSON array of
    objects, each {"file": "<add-on-relative path of the bundled file>", "url":
    "<source URL, or null if none is given>"}. Use forward slashes in paths and do
    not invent files or URLs that are not in the text. Return [] if it lists none.
  vendor-npm-resolve: |-
    The data below describes ONE third-party library file an add-on bundled,
    copied from a GitHub repository: its repo ("owner/name"), the git ref it was
    taken at, the bundled file's add-on-relative path, and the source URL.
    Identify the npm package this library is published as, so it can be audited
    for known vulnerabilities. Respond with ONLY a JSON object {"name": "<the exact
    npm package name>", "version": "<the npm version matching the ref, or null>"}.
    Use the exact npm package name, including an "@scope/" prefix for a scoped
    package. If you cannot confidently identify a corresponding npm package,
    respond {"name": null}. Do not invent a package name.
  build-analysis: |-
    You are shown the build files of a source code archive the reviewer will BUILD from the
    readable source: the build scripts, the config files of the build tools they run, and
    package.json (its "scripts" and the declared dependencies). The reviewer runs `npm ci` to
    install the declared dependencies, then the build. Some files a script names may be absent -
    those are inert assets (icons, docs) the linter dropped; do NOT treat an absent file as a
    problem. A "LINTER SIGNALS" block, if present, lists build steps the linter could not
    statically follow - weigh them.

    Classify the build into EXACTLY ONE category and respond with ONLY a JSON object
    {"classification": "<value>", "reason": "<one sentence for the developer>",
    "buildInstructions": "<one short note on how the XPI is built>"}.

    classification values (choose the MOST SEVERE that applies; remote-fetch outranks the rest):
    - "remote-fetch": a build step fetches or executes code or a resource from a source that is
      NOT a declared dependency - a raw http(s) URL, curl / wget / Invoke-WebRequest, a
      download-and-run of a remote blob, a `git clone` of a repo not pinned in the lock file, a
      <script>/CDN tag, or an install hook that fetches remote code. Installing the declared
      dependencies (npm ci/install resolving the lock file, importing a declared package, copying
      from node_modules) is NOT a remote fetch.
    - "not-from-source": the build does not actually build - it only copies or zips files that are
      ALREADY in the submission into the XPI, so the shipped add-on is not derived from the
      reviewed source (phantom artifacts).
    - "ok": a genuine build that compiles or bundles the authored source and pulls only from the
      declared dependencies (this includes a build whose only real work is copying installed
      libraries from node_modules into the add-on).

    In "reason" explain the classification in one or two sentences (shown to the developer). In
    "buildInstructions" state how the XPI is built as one short self-contained note ("Build the
    XPI with: ..." or "The source documents no build steps."), taking the steps from the scanned
    files (a README/BUILD/CONTRIBUTING or the package.json scripts) and calling out any dedicated
    Thunderbird build instructions. Judge only the build's sources - not code quality.