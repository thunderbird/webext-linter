deterministic-checks:
# Flags use of a Mozilla/Thunderbird trademark in the add-on name (the icon is a
# separate manual check).
- title: Trademark violation
  severity: error
  check: trademark-violation.js
  response: |-
    This extension uses a registered trademark of Mozilla in its name or icon and is unallowable under Mozilla’s Trademark Policy (https://www.mozilla.org/foundation/trademarks/policy/). For Mozilla trademarks, the usage of “Mozilla” and “Thunderbird” are generally not allowed in the add-on name, except in the following format: “ADD-ON NAME for Thunderbird.”

# Flags API namespaces or members absent from the schema, or marked unsupported.
- title: Unknown or unsupported WebExtension API
  severity: error
  check: unknown-api.js
  response: |-
    "{{item}}" is not supported in the targeted Thunderbird version.
    Read more: https://webextension-api.thunderbird.net/.

# Flags deprecated APIs, and APIs added after the targeted Thunderbird version.
- title: Deprecated WebExtension API
  severity: info
  check: deprecated-api.js
  response: |-
    "{{item}}" is deprecated in the targeted Thunderbird version. Please migrate to a supported API.
    Read more: https://webextension-api.thunderbird.net/.

# Flags an API call whose required permission is not declared.
- title: Missing permission
  severity: error
  check: missing-permission.js
  response: |-
    "{{item}}" permission is required here, but is not declared in the manifest. Add it to the requested permissions.

# Flags an API call that needs a manifest key (e.g. "action") not declared.
- title: Missing manifest key
  severity: error
  check: missing-manifest-key.js
  response: |-
    {{item}} needs a manifest key that is not declared: {{keys}}. Add one of those keys to manifest.json.

# manifest.json is present but not valid JSON.
- title: Invalid manifest JSON
  severity: error
  check: manifest-invalid-json.js
  response: |-
    Invalid manifest.json: manifest.json is not valid JSON.
    Read more: https://webextension-api.thunderbird.net/.

# No manifest.json at the add-on root.
- title: Missing manifest
  severity: error
  check: manifest-missing.js
  response: |-
    Invalid manifest.json: no manifest.json at the add-on root.
    Read more: https://webextension-api.thunderbird.net/.

# A required top-level manifest key is absent.
- title: Missing required manifest key
  severity: error
  check: manifest-missing-key.js
  response: |-
    Invalid manifest.json: one or more required properties are missing.
    Read more: https://webextension-api.thunderbird.net/.

# manifest_version disagrees with the schema set being reviewed.
- title: Manifest version mismatch
  severity: error
  check: manifest-version-mismatch.js
  response: |-
    Invalid manifest.json: manifest_version {{item}} does not match the schema set (Manifest V{{schema}}).
    Read more: https://webextension-api.thunderbird.net/.

# A declared permission value that is neither a known permission, a
# data-collection permission, nor a match pattern.
- title: Unknown permission
  severity: error
  check: manifest-unknown-permission.js
  response: |-
    Invalid manifest.json: one or more requested permissions are unknown.
    Read more: https://webextension-api.thunderbird.net/.

# An unknown top-level manifest key (Thunderbird ignores it).
- title: Unrecognized manifest key
  severity: info
  check: unrecognized-manifest-key.js
  response: |-
    Invalid manifest.json: the following top-level keys are unknown and will be ignored by Thunderbird.
    Read more: https://webextension-api.thunderbird.net/.

# A known manifest key with a wrong-typed value (Thunderbird misreads it).
- title: Mistyped manifest value
  severity: warning
  check: mistyped-manifest-value.js
  response: |-
    Manifest entry issue: "{{item}}" {{detail}}. Thunderbird ignores or misreads such entries.
    Read more: https://webextension-api.thunderbird.net/.

# Flags manifest/loader references (scripts, popups, icons, ...) to files not in
# the package.
- title: Missing referenced file
  severity: error
  check: bundled-files.js
  response: |-
    "{{item}}" is referenced but not bundled with the add-on. Please include every referenced file in the package.

# Flags synchronous XMLHttpRequest (open(..., false)), which blocks the UI thread.
- title: Synchronous XMLHttpRequests
  severity: error
  check: sync-xhr.js
  response: |-
    The add-on makes a synchronous XMLHttpRequest, which can lock up the user interface. Please use an asynchronous request instead.

# Flags dynamic content written to innerHTML/outerHTML/srcdoc/insertAdjacentHTML.
- title: Modifying innerHTML, unsanitized HTML
  severity: warning
  check: unsafe-html.js
  response: |-
    Dynamic content is assigned via "{{item}}". If it can contain external or user-provided data, sanitize it (DOMPurify or the Sanitizer API) or build the DOM with textContent / createElement.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/innerHTML.html.

# Flags unconditional debugger statements left in shipped code.
- title: Debugger statement
  severity: error
  check: debugger-statement.js
  response: |-
    Unconditional debugger statement. Please remove it or move it behind a config flag.

# Flags an async listener passed to runtime.onMessage.addListener().
- title: Async listener in runtime.onMessage()
  severity: warning
  check: async-onmessage.js
  response: |-
    Asynchronous listener attached to runtime.onMessage. This is error-prone and must be avoided.
    Read more: https://webextension-api.thunderbird.net/en/mv3/guides/runtimeMessaging.html

# ESLint correctness rules (no-redeclare/no-shadow/no-empty/no-unreachable/...)
# over the add-on’s authored JS. Style/fixable rules are excluded (read-only tool).
- title: JavaScript code errors
  severity: info
  check: code-sanity.js
  response: |-
    Static analysis flagged a likely code error: {{item}}

# Flags broad host permissions (<all_urls> or a "*" host) requested as required.
- title: Minimize host permissions
  severity: info
  check: minimize-host-permissions.js
  response: |-
    The manifest requests one or more very broad host permissions that are granted at install. Request only the specific hosts your add-on actually needs. If it genuinely needs broad access, declare them as optional host permissions so the user can grant them on demand rather than up front.
    Read more: https://thunderbird.topicbox.com/groups/addons/Tafa58394231a18f8-M3e565a75287313ea4395ff5f/prefer-to-use-optionalhostpermissions-to-get-around-cors-issues-with-fetch

# Flags a declared permission the --full-summary LLM pass judged unused (a
# warning) or could not confirm is used (manual review). Always runs, reading the
# structured list that pass stored on the context: when the list holds entries
# they are evaluated, otherwise there is nothing to evaluate (its mirror,
# Unused permissions, raises the by-hand reminder). The {{reason}} slot carries
# the model’s developer-facing why.
- title: Possibly unused permission
  severity: warning
  check: unused-permission.js
  phase: post-summary
  response: |-
    The "{{item}}" permission appears to be unused. {{reason}} An add-on should request only the permissions it needs, to keep the install-time permission prompt minimal. If it is in fact used, please specify which part of your add-on stops working if it is removed.
  instructions: |-
    The "{{item}}" permission may be unused. {{reason}} Confirm whether the add-on
    actually needs it, and if not, ask the developer to remove it.

# The by-hand mirror of the check above: raises one generic reminder to review
# unused permissions whenever the --full-summary analysis did not run (so no list
# was produced). Always runs and only escalates (it never emits a finding), so it
# has no severity; the instructions name no specific permission, and the response
# is the developer-facing wording for a permission confirmed unused by hand.
- title: Unused permissions
  check: unused-permission-manual.js
  phase: post-summary
  response: |-
    One or more declared permissions appear to be unused. An add-on should request only the permissions it needs, to keep the install-time permission prompt minimal. Please remove any permission your add-on does not use, or let us know which part of the add-on stops working without it.
  instructions: |-
    Review whether the following declared permissions are used, and ask the
    developer to remove any that are not needed.

# Flags a bundled-looking third-party library - JS or CSS - (banner/UMD/.min.
# name/known name) not declared in a VENDOR file.
- title: Missing third-party library reference
  severity: error
  check: missing-library.js
  response: |-
    The following file(s) appear to be third-party libraries. Please link to their sources and ensure each bundled copy is identical to the linked version (a VENDOR file at the add-on root is common practice).
    Example: https://webextension-api.thunderbird.net/en/mv3/guides/innerHTML.html#safely-sanitizing-external-markup-with-dompurify
    Read more: https://extensionworkshop.com/documentation/publish/third-party-library-usage/.

# Flags shipped minified or obfuscated JS that is not a recognized library;
# asks for the original sources.
- title: Source Archive (minified or obfuscated code) required
  severity: error
  check: obfuscated-code.js
  response: |-
    The following file(s) are minified, obfuscated or otherwise machine-generated code, which cannot be reviewed in this form. The simplest fix is to ship the original, human-readable code directly (the add-on does not need to be minified or obfuscated). Alternatively, upload the original sources as a source code archive that includes the build instructions and build process needed to generate the final XPI, using the source code upload field available during submission or on the version page in the developer hub.
    Please read the instructions: https://extensionworkshop.com/documentation/publish/source-code-submission/

# Diff check (--diff-to): a version + gecko strict_max_version-only bump that the
# developer could make on ATN instead of resubmitting.
- title: 'strict_max_version can be updated on ATN'
  severity: info
  check: strict-max-version-bump-only.js
  diff: true
  response: |-
    Instead of submitting a new version that only increases the strict_max_version entry in your manifest, you can update the max version setting of the most recent submission directly on this add-on’s ATN admin page.

# Reports dynamic/aliased API access the static analysis cannot resolve.
- title: Static analysis coverage
  severity: info
  check: api-coverage.js
  response: |-
    Limited static-analysis coverage: {{item}}

# Reports a file that failed to parse, so its API checks were skipped.
- title: Unparsable file
  severity: info
  check: unparsable-file.js
  response: |-
    Limited static-analysis coverage: could not be parsed, so API checks were skipped ({{detail}})

# Rejects an Experiment (declares experiment_apis) unless --allow-experiments.
# phase: invalid-experiment - the orchestrator runs ONLY this check (and nothing
# else, no LLM) when the add-on is an Experiment and --allow-experiments is off.
- title: Experiment APIs not accepted
  severity: error
  check: experiment-not-allowed.js
  phase: invalid-experiment
  response: |-
    We are currently not accepting new submissions using Experiment APIs.
    Read more: https://thunderbird.topicbox.com/groups/addons/T6ff545fb6d479da5/temporary-pause-on-new-experiment-api-add-on-reviews

# Flags an accepted Experiment (--allow-experiments) that declares no
# strict_max_version.
- title: Experiment missing strict_max_version
  severity: error
  check: experiment-missing-strict-max-version.js
  response: |-
    This add-on uses Experiment APIs but declares no strict_max_version. Experiments rely on internal APIs that change between major Thunderbird versions, so they must set browser_specific_settings.gecko.strict_max_version.

# Flags a non-Experiment that pins strict_max_version (only blocks newer
# Thunderbird; the APIs are forward-compatible).
- title: Unnecessary strict_max_version
  severity: warning
  check: non-experiment-strict-max-version.js
  response: |-
    This add-on pins strict_max_version "{{item}}". The WebExtension APIs are stable and designed to keep add-ons forward-compatible across Thunderbird versions, so a maximum version is usually unnecessary and only blocks installs on newer Thunderbird.

# Third-party (vendored) declarations - a package.json with dependencies, or a
# VENDOR file listing files and their source URLs - are resolved and verified
# once before the review (src/vendor/*: parse, pin, fetch, byte-compare,
# popularity). The vendor checks below read that precomputed result: three
# reject a submission (an unpinnable dependency, a non-pinned source, or a
# modified file), one escalates the unverifiable cases to manual review, and one
# warns when a declared file is missing.
- title: Unpinned dependency
  severity: error
  check: unpinned-dependency.js
  response: |-
    A bundled dependency is not pinned to an exact version: {{item}}, declared as "{{spec}}". A version range can resolve to different releases over time, so the bundled copy cannot be verified against a known upstream. Pin it to an exact version in package.json, or commit the lock file (package-lock.json, npm-shrinkwrap.json, yarn.lock, or pnpm-lock.yaml) that records the exact version used.

- title: Unpinned vendored source
  severity: error
  check: unpinned-vendor-source.js
  response: |-
    A vendored file cites a source that is not pinned to an immutable version: {{item}} is linked to {{url}}, which is a branch or unversioned URL rather than a pinned release. Link to a specific version, tag, or commit so the file can be verified against the exact bytes it was copied from.

- title: Modified vendored library
  severity: error
  check: vendor-modified.js
  response: |-
    A bundled third-party file does not match its declared source: {{item}} does not match the bytes its declared source ({{url}}) serves, so it appears to have been modified from the upstream release. Ship the file exactly as the source publishes it, or correct the declared source to the release the file actually came from.

# A deterministic check that escalates the declarations it cannot settle
# automatically to manual review (its `instructions`); it emits no findings, so
# it carries no severity.
- title: Vendored library needs manual verification
  check: vendor-unverified.js
  response: |-
    The following bundled third-party file(s) could not be automatically verified against their upstream source. For each, make sure your VENDOR file gives the library’s exact upstream version and a source URL that pins that release on a trusted host (unpkg, jsDelivr, cdnjs, or a raw GitHub URL), and that the bundled copy is unmodified, so it can be verified automatically.
  instructions: |-
    The following declared third-party (vendored) file(s) could not be verified
    automatically. Confirm by hand that each is an unmodified copy of a
    widely-used library obtained from a trustworthy source.

# Flags a VENDOR entry (file + source URL) whose file is absent from the package.
- title: Missing vendored file
  severity: warning
  check: missing-vendor-file.js
  response: |-
    One or more files listed in "{{item}}" are not present in the submission. Add each file to the submission, or remove its entry from "{{item}}".

# Flags data smuggled out through a channel not meant for it - always an error,
# regardless of consent. One check per channel (resource/stylesheet/window/
# navigation); all read the shared outbound-sink scan.
- title: Disguised data transmission (resource)
  severity: error
  check: disguised-resource.js
  response: |-
    This add-on appears to send data through a resource URL (image/iframe/media src) - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (stylesheet)
  severity: error
  check: disguised-stylesheet.js
  response: |-
    This add-on appears to send data through a stylesheet or CSS url() - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (window)
  severity: error
  check: disguised-window.js
  response: |-
    This add-on appears to send data through a window.open() to a remote URL - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

- title: Disguised data transmission (navigation)
  severity: error
  check: disguised-navigation.js
  response: |-
    This add-on appears to send data through a page navigation - a channel not meant for data transmission. Disguising transmission this way is not allowed, even with the user’s consent. Use a normal request and disclose what is sent.

# Flags data transmitted to a remote host over an unencrypted (http/ws/ftp)
# connection - any cleartext transmission, whatever the payload.
- title: Unencrypted data transmission
  severity: error
  check: cleartext-transmission.js
  response: |-
    Data is sent over an unencrypted connection to {{item}}. All data must travel over an encrypted channel - use https:// (or wss:// for sockets), never http://, ws:// or ftp://.

# Preflight -> manual review: data sent to a hardcoded remote host means the
# listing must carry a privacy policy, which is not part of the package.
- title: Remote data transmission needs a privacy policy
  check: privacy-policy.js
  response: |-
    Please add a privacy policy to this add-on that details which user data is being sent and to what services. The critical things to describe in the policy are how your extension collects, uses, stores, shares or discloses information about people. If your add-on makes it apparent to websites that it is installed, this must also be mentioned. The policy should be about the extension only, not a copy of the website’s privacy policy. It should also be the actual text, as opposed to a link to a privacy policy on a website. The privacy policy can be added in the add-on settings under "Manage Authors & License" on addons.thunderbird.net. For more information, please check our Review Policies [1], and Mozilla’s own privacy policy [2] as an example.

    [1]: https://thunderbird.github.io/atn-review-policy/#data-disclosure-collection-and-management
    [2]: https://www.mozilla.org/en-US/privacy/
  instructions: |-
    This add-on transmits data to one or more hardcoded remote servers. Confirm
    the ATN listing carries a privacy policy that discloses what data is
    collected and why. The privacy policy must be pasted into the ATN field
    directly (links to remotely hosted policies are not allowed).

# Preflight -> manual review: the nativeMessaging permission lets the add-on talk
# to a native application that is not part of the package.
- title: Native messaging needs disclosure
  check: native-messaging.js
  response: |-
    This add-on requests the "nativeMessaging" permission to exchange messages with a native application outside Thunderbird. This must be disclosed on the ATN listing page, including what information is exchanged. The native host itself does not need to be part of the package.
  instructions: |-
    This add-on requests the "nativeMessaging" permission. Confirm the add-on
    listing page on ATN discloses what information is exchanged with the local
    app and that it complies with the No Surprises policy. The native host
    itself does not need to be part of the package.

# Preflight -> manual review, new submissions only (diff: false skips it when
# reviewing an update against a --diff-to baseline): is this a fork that must be
# distinguished from the original? Escalate-only, so it carries no severity.
- title: Forked add-on
  diff: false
  check: fork-check.js
  response: |-
    The submission appears to be a fork of an existing add-on that is still being actively maintained. According to our review policies (https://thunderbird.github.io/atn-review-policy/):

    "If the add-on is a fork of another add-on, the name must clearly distinguish it from the original and provide a significant difference in functionality and/or code. Exceptions may be made in instances where the add-on is no longer maintained by the original author."

    Because the original project is still active, your submission does not meet these requirements. Small-change forks can sometimes cause confusion for users and unnecessary overlap for developers. We encourage you to consider contributing your improvements directly to the original project so that all existing users can benefit from your ideas.
  instructions: |-
    Check if the submission is a fork of an existing add-on. Such forks are only
    allowed on ATN if they are clearly distinguished from the original and
    provide a significant difference in functionality and/or code. Exceptions may
    be made where the add-on is no longer maintained by its original author. The
    primary goal, however, should be to connect the two developers and let the
    new developer help maintain or take over the existing add-on. In general,
    small-change forks of still-active projects cause confusion for users and
    unnecessary overlap for developers. We encourage developers to contribute
    their improvements directly to the original project.

# A packaged _locales directory requires a default_locale key, or Thunderbird
# will not load the add-on.
- title: Missing default_locale
  severity: error
  check: default-locale-missing.js
  response: |-
    A _locales directory is present but the manifest declares no default_locale, so Thunderbird will refuse to load the add-on. Add a default_locale naming the fallback locale (e.g. "en").

# A default_locale key requires a packaged _locales directory, or Thunderbird
# will not load the add-on.
- title: Unused default_locale
  severity: error
  check: default-locale-unused.js
  response: |-
    The manifest declares default_locale but the add-on ships no _locales directory, so Thunderbird will refuse to load the add-on. Add the _locales/<lang>/messages.json files, or remove default_locale.

# A background script using ES module syntax needs the background declared
# "type": "module", or it will not load.
- title: Background script needs type module
  severity: error
  check: background-module.js
  response: |-
    The following background code location(s) use ES module syntax (import/export), but the manifest’s background is not declared "type": "module", so Thunderbird will fail to load the background script(s). Add "type": "module" to the background entry.

# A background PAGE (background.page HTML) whose <script src> loads module-syntax
# JS but is not declared type="module" - the page fails to load that script.
- title: Background page script needs type module
  severity: error
  check: background-page-module.js
  response: |-
    The following background page code location(s) load a script that uses ES module syntax (import/export), but the <script> tag is not declared type="module", so Thunderbird will fail to load the background page. Add type="module" to the <script> tag.

# Dynamic code execution: the definite cases are deterministic (eval / Function
# constructor / code-string timers, and unsafe-eval/unsafe-inline in the CSP);
# the ambiguous fetch().then(eval) case is the remote-eval llm check below. All
# read the shared dynamic-execution scan.
- title: eval() usage
  severity: error
  check: eval-call.js
  response: |-
    Dynamic code execution via "eval()" is not allowed.

- title: Function constructor usage
  severity: error
  check: function-constructor.js
  response: |-
    Dynamic code execution via "the Function constructor" is not allowed.

- title: Code-string timer
  severity: error
  check: string-timer.js
  response: |-
    Dynamic code execution via "a code string passed to setTimeout/setInterval" is not allowed.

- title: CSP allows 'unsafe-eval'
  severity: error
  check: csp-unsafe-eval.js
  response: |-
    Dynamic code execution via "content_security_policy 'unsafe-eval'" is not allowed.

- title: CSP allows 'unsafe-inline'
  severity: error
  check: csp-unsafe-inline.js
  response: |-
    Dynamic code execution via "content_security_policy 'unsafe-inline'" is not allowed.


# Deterministic check: user-facing text hardcoded in a non-English language when
# the add-on ships no English _locales. franc detects the language over the HTML
# visible text and the manifest name/description (see the check). A confident
# non-English result is the finding. Too little or ambiguous text routes to
# manual review via `instructions`.
- title: Missing English localization
  severity: warning
  check: missing-english-localization.js
  instructions: |-
    This add-on ships no English localization, so user-facing text may be
    hardcoded in another language. Review its strings by hand and confirm if an
    English localization is provided.
  response: |-
    Please include an English localization. English serves as the default language in Thunderbird, and most users who do not understand the hardcoded language will most likely be able to read English. The i18n API allows defining strings for multiple locales, and Thunderbird automatically selects the one that best matches the user’s interface language.
    An example can be found here: https://github.com/thunderbird/webext-examples/tree/master/manifest_v2/i18n

# An llm-check carries a `prompt` (the rubric sent to the LLM for an ambiguous
# case) and an `instructions` (the message printed when the case is routed to
# manual review instead - no token, the LLM is unsure, or it errored). A
# confident LLM "fail" emits a normal finding rendered from `response`.
llm-checks:
# LLM check: hidden/junk files and files reachable from no entry point; the
# ambiguous (dynamically-loadable) ones are escalated to the LLM.
- title: Unused, hidden or duplicate files or folders
  severity: error
  check: unused-files.js
  prompt: |-
    Each candidate is a site in the add-on (a file:line) whose code or data
    mentions another packaged file F, named in the candidate note as "does this
    site load F". For that candidate, decide only whether this site actually
    loads or uses F at runtime.

    Verdict pass (this site loads F): a static or dynamic import, a getURL or
    executeScript, an HTML or CSS reference, a runtime-built path, or a data or
    configuration entry the add-on consumes (for example one entry in a list of
    selectable sounds, themes, or icons). It may load F only when a user chooses
    it, and a valid functional reference is enough.

    Verdict fail (this site does not load F): the mention is incidental (a
    comment, documentation, or packaging metadata the add-on does not consume),
    or it is unrelated code.

    Use unsure only when you genuinely cannot tell. F’s own contents do not
    matter, only whether this site loads it.
  instructions: |-
    The following files are not reachable from any entry point but may be loaded
    dynamically. Confirm by hand whether they are unused and safe to remove.
  response: |-
    The following file(s) appear to be unused or hidden files or folders. Such files complicate the review, may leak information about the system the XPI was built on, or needlessly increase the size of the add-on. Please correct your packaging process so they are not included.

# LLM check: over-broad or unloaded web_accessible_resources exposure.
- title: Minimize web_accessible_resources
  severity: warning
  check: minimize-web-accessible-resources.js
  prompt: |-
    Each candidate is a site (file:line) that references a web_accessible_resources
    file F, named in the candidate note as "does this site load F for a web
    context". For that candidate, decide only whether this site loads F for a web
    context (a content script, a page, or a plausible external web page).

    Verdict pass (this site loads F): a getURL, a fetch, an HTML or CSS reference,
    or a dynamic or data-built path. A reference need not be a manifest entry
    point.

    Verdict fail (this site does not load F): the reference is incidental, or it
    is unrelated code.

    Use unsure only when you genuinely cannot tell.
  instructions: |-
    The following resources are exposed via web_accessible_resources but nothing
    in the add-on loads them. Confirm by hand whether they need to be exposed.
  response: |-
    One or more resources are registered as web_accessible_resources but may not need to be exposed. List files there only if a web page or content script must access them. Otherwise remove these entries to reduce the add-on’s exposed surface.

# LLM check: remote <script>/<link>/@import/importScripts/injection and CSP
# sources that permit remote code.
- title: Remote script injection
  severity: error
  check: remote-script.js
  prompt: |-
    Each candidate is a site (file:line) that loads or injects script or code
    from a source static analysis could not resolve to a bundled file. For each
    candidate, determine whether the loaded code comes from a remote source
    (verdict fail) rather than a packaged file (verdict pass). Use unsure when you
    genuinely cannot tell.
  instructions: |-
    "{{item}}" loads code from a source static analysis cannot resolve. Confirm
    by hand that it is bundled with the add-on and not fetched remotely.
  response: |-
    Remote code is loaded from "{{item}}". Remote scripts and libraries are not allowed. Please bundle all code with your add-on so it can be reviewed.

# LLM check: the statically-undecidable fetch().then(eval) case - is the executed
# code remote? The definite eval/Function/timer/CSP cases are deterministic
# checks above.
- title: Remote eval
  severity: error
  check: remote-eval.js
  prompt: |-
    Each candidate is a site (file:line) that executes code built or fetched at
    runtime, such as fetch().then(eval). For each candidate, determine whether the
    executed code is fetched from a remote source (verdict fail) rather than
    static and local (verdict pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    "{{item}}" may execute code that is fetched at runtime. Confirm by hand that
    no remotely fetched code is executed.
  response: |-
    Remotely fetched code is executed at "{{item}}". Remote code execution is not allowed - bundle all code with the add-on so it can be reviewed.

# LLM check: normal transmission (fetch and friends) to a remote host - allowed
# only with an options-page opt-in, judged from the options page in evidence.
- title: User-data exfiltration
  severity: error
  check: data-exfiltration.js
  prompt: |-
    Each candidate is a site (file:line) that sends data to a remote server (via
    fetch, XMLHttpRequest, WebSocket, EventSource, or sendBeacon). Sending user
    data such as message content, attachments, contacts, or credentials to a
    remote host is allowed ONLY if the user actively enabled it, by entering the
    destination URL or credentials on an options page that lists what is actually
    transmitted, or via an explicit off-by-default opt-in for a hard-coded URL.
    Thunderbird has no built-in data-collection consent prompt. The add-on’s
    options page, when it has one, is among the files below. For each candidate,
    determine whether user data is transmitted WITHOUT such consent (verdict fail)
    or not (verdict pass). Use unsure when you genuinely cannot tell.
  instructions: |-
    The following code locations transmit data to a remote server. Confirm by
    hand that any user data they send is gated behind an explicit opt-in (a
    documented options-page setting) and is never sent without consent.
  response: |-
    The following code location(s) send user data to a remote server without an explicit opt-in. User data may be transmitted only when the user actively enables it on an options page that discloses what is sent.


manual-checks:
# Manual: inspect the listing + add-on for spam, inappropriate, or low-effort
# content.
- title: Check the submission for spam
  severity: error
  instructions: |-
    Inspect the listing (name, summary, description, screenshots) and the add-on
    itself. Determine if it looks like spam or contains inappropriate, misleading,
    or low-effort content.
  response: |-
    This add-on contains inappropriate content.

# Manual: exercise the add-on in a test profile; may need credentials or info.
- title: Test the add-on and request testing information if needed
  instructions: |-
    Test the add-on’s functionality in a test profile, and check if it needs
    additional information like credentials in order to continue the review.
  response: |-
    Please provide us with detailed information on how to test this add-on. If authentication to a website is necessary, give us a test username and password to facilitate our work. This can be provided in the Whiteboard field, which can be found in the Edit Listing page under the Technical Details section. This information is only available to reviewers.

# Manual: behavior not documented on the ATN listing (inspect the version diff).
- title: Check for "No Surprises" policy violations
  instructions: |-
    Test the add-on’s functionality in a test profile and inspect the code for
    any unexpected features or behavior that is not documented on the ATN
    listing page and could be a surprise to the user. A diff against the last
    accepted version may be helpful.
  response: |-
    Your add-on includes a feature that is not related to its primary function and is not mentioned in the description of your add-on listing page on ATN (addons.thunderbird.net). This feature must be strictly opt-in: <name of feature>.

# Manual: payment is required but the ATN "needs payment" flag is off.
- title: Check for a missing payment disclosure
  instructions: |-
    Test the add-on’s functionality in a test profile. Verify whether the
    add-on requires a subscription or other form of payment to function but the
    "needs payment" flag on the add-on’s ATN listing page is not enabled.
  response: |-
    It looks like a payment is required to use this add-on or the service this add-on relies on, either upfront, after a trial period or in conjunction with a paid software. If so, we need to ask you to update the payment status to yes.

# Manual: limited/non-public audience (better self-hosted than publicly listed).
- title: Check suitability for listing
  instructions: |-
    Judge whether the add-on targets a limited or non-public audience (for
    example an internal, single-organization, or test-only add-on) and should
    better self-hosted than publicly listed on ATN.
  response: |-
    Due to its limited or non-public audience, this add-on is not suitable for listing on ATN (addons.thunderbird.net). Please consider self-hosting and distributing it yourself.

# Manual: name/summary/description/screenshots vs Mozilla’s Acceptable Use Policy.
- title: Acceptable Use Policy
  instructions: |-
    Check the name, summary, description, and screenshots against Mozilla’s
    Acceptable Use Policy (https://www.mozilla.org/about/legal/acceptable-use/).
  response: |-
    The name, summary, description, and/or or screenshot(s) of this extension contain content that does not comply with Mozilla’s Acceptable Use Policy (https://www.mozilla.org/about/legal/acceptable-use/).

# Manual: icon imitating the Thunderbird/Mozilla logo (an image checks can’t see).
- title: Check the icon for trademark or logo imitation
  instructions: |-
    Inspect the add-on’s icon, if it imitates or incorporates the Thunderbird or
    Mozilla logo.
  response: |-
    This add-on’s icon imitates or incorporates a Mozilla trademark (the Thunderbird or Mozilla logo), which is not allowed under Mozilla’s Trademark Policy (https://www.mozilla.org/foundation/trademarks/policy/). Please use a distinct icon.

# Manual: the ATN listing page lacks usage details/entry points or screenshots.
- title: Missing ATN description or details
  instructions: |-
    Verify that the add-on listing page on ATN includes detailed instructions on
    how to use the add-on and where to find its entry points. It should also
    include screenshots to help users quickly understand how the add-on works.
  response: |-
    The add-on listing page on ATN (addons.thunderbird.net) should include detailed instructions on how to use the add-on and where to find its entry points. Please also include screenshots to help users quickly understand how the add-on works.

# Manual: the ATN listing page should have an English version.
- title: Missing English ATN localization
  instructions: |-
    Verify that the ATN listing page also has an English version.
  response: |-
    The add-on listing page on ATN (addons.thunderbird.net) should also have an English localization. English serves as the default language in Thunderbird, and most users who do not understand the available non-English version will most likely be able to read English.

# Headings shown above each severity group in the report’s Issues section
# (numbering is continuous across the groups).
issue-headings:
  error: "The following findings caused the submission to be rejected:"
  warning: "We kindly ask you to resolve the following issues with your next release:"
  info: "We would like to share the following information with you:"


# System notices the orchestrator emits (not tied to one check): "{{item}}" is
# filled with the relevant check id / token. Keeps every printed string here.
messages:
  check-failed: |-
    The "{{item}}" check could not be run. The other checks still ran.
  llm-unavailable: |-
    "{{item}}" could not be evaluated automatically. Review this step by hand.

# The customer-facing preamble at the top of the report’s Issues section: "none"
# when there are no findings, "rejected" when there is any error finding, and
# "feedback" otherwise (warnings/info only). With findings, it is glued to the
# first severity heading; with none, it is the whole Issues body.
verdict-intros:
  none: "No issues found."
  feedback: "Thank you for your contribution, it will be approved shortly."
  rejected: "Thank you for your submission. We appreciate the effort you’ve put into creating this add-on. However, it cannot be accepted and hosted on addons.thunderbird.net in its current form."

# Tool-defining prompts the registry owns, like check rubrics and `messages`, so
# every model-facing string lives in this one file.
#   system-intro:   the fixed reviewer role prompt - the first system block of
#                   every LLM check call. It explains the fail/pass/unsure
#                   verdicts whose structured shape (the forced result tool) lives
#                   in src/llm/claude.js (RESULT_SCHEMA).
#   change-summary: the AI "Summary of changes" prompt. The orchestrator emits it
#                   only with --diff-summary (which itself needs --diff-to and an
#                   Anthropic token); the model’s prose is shown verbatim as an
#                   advisory aid (not a finding).
#   add-on-summary: the AI "Summary of add-on" prompt. Emitted only with
#                   --full-summary and a token; via the forced report_addon_review
#                   tool it returns prose (what the (almost) full current add-on
#                   does, with security notes and a permission review) plus the
#                   structured list of permissions that appear unused. The prose is
#                   advisory; the unused-permission list feeds the
#                   unused-permission check, which raises it as Issues.
#   vendor-parse:   the LLM fallback that parses a free-form VENDOR file into
#                   structured {file, url} declarations, used during vendor
#                   resolution when the deterministic scan comes up empty and a
#                   token is set (token-less stays deterministic).
prompts:
  system-intro: >-
    You are a Thunderbird WebExtension add-on reviewer. Each request gives you
    one review step (a rubric) and a numbered list of CANDIDATES, each an id
    pointing at a file:line site, together with the FILES they appear in. Judge
    every candidate and report by calling the report_verdicts tool with one entry
    per candidate id. For each id, return verdict='fail' when you are confident
    the issue this step looks for is present at that candidate, 'pass' when you
    are confident it is absent, and 'unsure' when you cannot be confident either
    way (a human then reviews it). Only give a definite verdict when you are
    genuinely confident, and prefer 'unsure' over guessing. Use the exact ids
    from the CANDIDATES list and never invent ids.
  change-summary: |-
    You are comparing two versions of a Thunderbird WebExtension add-on. Below is
    what changed from the previous to the current version (a file-level diff).
    Summarize the changes for a reviewer as a few concise bullet points: new or
    removed features, changed behavior, new permissions or APIs, and anything
    security- or privacy-relevant. Be factual and specific, and call out anything
    a user might find surprising. If nothing meaningful changed, say so.
  add-on-summary: |-
    Review this Thunderbird WebExtension add-on from its (almost complete) current
    sources below and report by calling the report_addon_review tool. Fill its two
    fields as follows.
    The "summary" field is prose for a reviewer. Cover, as a few concise bullet
    points: what the add-on does (its main features), the notable APIs it uses,
    and how it interacts with the network or the user’s data. Then list any
    security- or privacy-relevant observations. Be factual and specific. Do not
    list the declared permissions in this part, the permission review is their
    only home. Then add a separate bullet group titled "Permission review". Go
    through every declared permission (the declared permissions block lists them)
    and judge from the code whether it is actually needed, noting briefly what
    justifies each or that it appears unused. A permission can be justified in two
    ways. It is justified if the add-on calls an API that requires it (for example
    the "downloads" permission for downloads.download). It is also justified if the
    add-on reads a property of returned data that the permission gates (for example
    the "accountsRead" permission gates a message header’s folder property, so
    reading that folder justifies it). A permission appears unused only when
    neither holds. Be careful with the "tabs" and "activeTab" permissions and with
    host permissions, a common source of error. Calling tabs methods such as
    tabs.query, tabs.create, tabs.update, tabs.remove, tabs.sendMessage, and the
    tabs events does not by itself require any permission. Two capabilities are
    what actually require one. Reading the privileged tab properties url, title,
    and favIconUrl (or filtering a tabs.query by them) requires "tabs" (any tab),
    or a host permission that matches the tab’s url (matching tabs only), or
    "activeTab" (the active tab after a user action). Injecting script or CSS with
    tabs.executeScript or tabs.insertCSS requires a host permission that matches
    the tab’s url, or "activeTab", and is never granted by "tabs". In Thunderbird,
    injecting into or scripting a message display tab or a compose tab never
    requires "tabs" either. Message display scripts are registered with
    messageDisplayScripts.register, which requires "messagesModify", and compose
    scripts with composeScripts.register, which requires "compose", and
    tabs.executeScript or tabs.insertCSS aimed at the message pane or a compose
    window does not require "tabs". So treat "tabs"
    as justified only when the add-on reads one of those three properties (or
    filters a query by them) for tabs that its host permissions do not already
    cover. Treat a host permission as justified when it is used for injection,
    network access to that origin, or reading those properties of matching tabs.
    Treat "activeTab" as justified when an injection or property read is confined
    to the active tab after a user gesture such as a toolbar or menu click, a
    keyboard shortcut, or a button on a bundled page. A broad host permission such
    as "<all_urls>" usually makes "tabs" redundant for property reads.
    The "unusedPermissions" field is the machine-readable list of just the
    permissions your permission review found wanting, so the tool can raise them
    in the report. Add an entry for every declared permission (or host match
    pattern) that you judged unused or could not confirm is used, and omit the ones
    that are clearly justified. Use the exact permission string as written in the
    manifest. Set status to "unused" when you are confident the add-on does not
    need it, or "unsure" when you genuinely cannot tell (a human then decides).
    Give a one sentence reason for each. Prefer "unsure" over guessing.
    This is an advisory overview. The formal findings in the review report above
    are authoritative, not this summary.
  vendor-parse: |-
    The text below is an add-on’s VENDOR file: a developer’s free-form list of the
    bundled third-party library files it ships, each with the source URL it was
    copied from. Extract those declarations. Respond with ONLY a JSON array of
    objects, each {"file": "<add-on-relative path of the bundled file>", "url":
    "<source URL, or null if none is given>"}. Use forward slashes in paths and do
    not invent files or URLs that are not in the text. Return [] if it lists none.